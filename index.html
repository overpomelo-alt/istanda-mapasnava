    <div class="splash-word">LUMAH</div>
  </div>

<script>
(function(){
  var s = document.getElementById('splash');
  if (!s) return;
  if (sessionStorage.getItem('istanda_splash_seen')) { s.style.display='none'; return; }
  sessionStorage.setItem('istanda_splash_seen','1');
  setTimeout(function(){
    s.classList.add('splash--hide');
    setTimeout(function(){ if (s.parentNode) s.parentNode.removeChild(s); }, 650);
  }, 2700);
})();
</script>

  <!-- ============ Firebase + 應用邏輯 ============ -->
  <!-- ⚠️ 你之後要把這個換成你自己的 Firebase 設定 -->
  <script type="module" src="script.js?v=20"></script>

  <!-- PWA Service Worker 註冊 + 自動更新(Task 6) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          reg.update();
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(e => console.error('[SW] 註冊失敗', e));
      });
      // 新版 SW 接管 → 自動 reload(解「要清資料才看到新版」)
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
    }
  </script>
