    /* ============================================================
       Task 5 Step 2a:單張照片壓縮 + 自寫 minimal EXIF reader
       ⚠️ 臨時測試區、Step 2b 會把 compressPhoto 接進發貼文 modal、測試 UI 拆掉
       Q-A 拍板:自寫、只讀 0x0112 orientation marker、不引第三方 library
       ============================================================ */

    const PHOTO_MAX_EDGE = 1080;          // 長邊上限
    const PHOTO_JPEG_QUALITY = 0.8;       // 輸出 JPEG 品質
    const PHOTO_MAX_BYTES = 5 * 1024 * 1024; // 單張壓縮後上限(spec:超過丟錯、上層提示換一張)

    // Step 2b-1:Step 2a 頁內測試面板已拆。dlog 保留走 console(壓縮鏈 compressFromImg /
    // compressPhoto / loadRawImage 仍呼叫、2b-2 接發貼文 modal 時直接複用)。dlogReset / activeDebugEl
    // 0 呼叫端、已清(規則 1 補充:0 讀取的死代碼直接清)。
    function dlog(line) { console.log("[photo]", line); }

    /* 自寫 minimal EXIF orientation reader
       只在 JPEG 檔頭找 APP1(FFE1)→ "Exif\0\0" → TIFF → IFD0 → tag 0x0112。
       任何看不懂的狀況一律 return 1(當作正常方向、graceful degrade)。 */
    async function readExifOrientation(file) {
      try {
        // orientation 一定在檔頭、讀前 64KB 綽綽有餘(省記憶體、不整檔讀)
        const buf = await file.slice(0, 65536).arrayBuffer();
        const view = new DataView(buf);
        const len = view.byteLength;

        // 開頭必須是 JPEG SOI(0xFFD8);PNG / 其他格式沒 EXIF orientation → 當 1
        if (len < 4 || view.getUint16(0) !== 0xFFD8) return 1;

        let offset = 2; // 跳過 SOI、開始掃 marker
        while (offset + 4 <= len) {
          const marker = view.getUint16(offset);     // marker 與長度都是 big-endian
          if (marker === 0xFFE1) {                    // APP1 = EXIF 所在
            const segStart = offset + 4;              // 跳過 FFE1(2) + segment length(2)
            // 確認 payload 開頭是 "Exif"(0x45786966);不是就放棄
            if (segStart + 8 > len || view.getUint32(segStart) !== 0x45786966) return 1;
            const tiff = segStart + 6;                // 跳過 "Exif\0\0"(6 bytes)到 TIFF header
            // TIFF byte order:0x4949 = "II" little-endian、0x4D4D = "MM" big-endian
            const little = view.getUint16(tiff) === 0x4949;
            const ifd0 = view.getUint32(tiff + 4, little); // IFD0 相對 TIFF header 的 offset
            let dir = tiff + ifd0;
            if (dir + 2 > len) return 1;
            const entries = view.getUint16(dir, little);   // IFD0 entry 數
            for (let i = 0; i < entries; i++) {
              const entry = dir + 2 + i * 12;          // 每筆 entry 12 bytes
              if (entry + 12 > len) break;
              if (view.getUint16(entry, little) === 0x0112) { // 0x0112 = Orientation tag
                const val = view.getUint16(entry + 8, little); // SHORT 值在 entry 第 8 byte
                return (val >= 1 && val <= 8) ? val : 1;
              }
            }
            return 1; // 有 EXIF 但沒 orientation tag
          }
          if ((marker & 0xFF00) !== 0xFF00) return 1; // 不是合法 marker、放棄
          if (marker === 0xFFDA) return 1;            // 到了 SOS(影像資料)、不用再找
          const segLen = view.getUint16(offset + 2);  // 其他 segment:用長度跳過
          if (segLen < 2) return 1;
          offset += 2 + segLen;
        }
        return 1;
      } catch (err) {
        console.warn("readExifOrientation 失敗、降級當 1:", err);
        return 1;
      }
    }

    /* 方向 α 拍板(2026-05-28 a1 修):信任瀏覽器自動依 EXIF 轉正、拿「已轉正」像素直接畫、不手動旋轉。
       理由:iOS Safari 上 imageOrientation:'none' 不被尊重(a1 證據:orientation=6 卻拿到 3024×4032 已轉正像素),
       再手動轉一次 = 雙重旋轉、人躺平。現代 iOS Safari 13.4+ / Android Chrome / 桌機 Chrome 81+ 全會自動轉正、
       直接信任最穩、code 最少、跨機型一致。

       a7 修(2026-05-28):三層 fallback 鏈、每層失敗有 console 診斷 + 精確 ERROR_TYPE。
       Path 1: createImageBitmap(file)        — 最現代、最快
       Path 2: Image() + objectURL + 5s timeout — Android Chrome 主路徑
       Path 3: FileReader → dataURL → Image    — 最後保險、相容性最高、慢 */
    const LOAD_IMAGE_TIMEOUT_MS = 5000;

    /* a7 八輪:Path 0 — img.decode()(瀏覽器原生解碼、繞過 createImageBitmap / FileReader 那條程式化讀 bytes 路徑)
       Samsung S21 Ultra 證據:原圖預覽(<img src=objectURL>)能顯示 → 瀏覽器內部解碼可行;
       三層程式化路徑全掛 → 主動讀 bytes 是死路。讓瀏覽器自己解碼、我們只從已解碼的 img 畫 canvas。
       Path 0 OK 就直接用、不往下走 1/2/3。 */
    async function loadViaDecode(file) {
      const url = URL.createObjectURL(file);
      const img = document.createElement("img");
      img.style.cssText = "position:absolute;left:-99999px;top:0;width:auto;height:auto;visibility:hidden;pointer-events:none;";
      img.src = url;                       // src 先設、decode() 前才能解碼
      document.body.appendChild(img);      // Samsung 證據:DOM-attached 較易解碼
      try {
        await img.decode();
        dlog("[load] img.decode() OK w=" + img.naturalWidth + " h=" + img.naturalHeight);
        return {
          source: img, w: img.naturalWidth, h: img.naturalHeight,
          // cleanup 由 compressPhoto finally 呼叫:drawImage 用完才移除 img + revoke
          cleanup: () => { if (img.parentNode) img.parentNode.removeChild(img); URL.revokeObjectURL(url); }
        };
      } catch (e) {
        // 規則 5:decode 失敗也要立刻釋放、不留殘 img / 不洩漏 objectURL
        if (img.parentNode) img.parentNode.removeChild(img);
        URL.revokeObjectURL(url);
        dlog("[load] DECODE_FAILED name=" + (e && e.name ? e.name : "?") + " msg=" + (e && e.message ? e.message : e));
        throw new Error("DECODE_FAILED: " + (e && e.message ? e.message : e));
      }
    }

    function loadViaObjectURL(file) {
      // a7 五輪:DOM-attached 隱藏 img(Samsung S21 Ultra / Chrome 148 證據:detached img + 程式化讀取
      // 全拿不到 file blob;但 DOM 內的 <img> 直接吃 objectURL 可以,如原圖預覽。把 img 掛進 DOM 是關鍵差異。)
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = document.createElement("img");
        img.style.cssText = "position:absolute;left:-99999px;top:0;width:auto;height:auto;visibility:hidden;pointer-events:none;";
        document.body.appendChild(img);
        let settled = false;
        const removeImg = () => { if (img.parentNode) img.parentNode.removeChild(img); };
        const finish = (fn) => { if (settled) return; settled = true; clearTimeout(t); fn(); };
        const t = setTimeout(() => finish(() => {
          removeImg();
          URL.revokeObjectURL(url);
          dlog("[load] OBJ_TIMEOUT");
          reject(new Error("IMAGE_LOAD_FAILED: timeout " + LOAD_IMAGE_TIMEOUT_MS + "ms"));
        }), LOAD_IMAGE_TIMEOUT_MS);
        img.onload = () => finish(() => resolve({
          source: img, w: img.naturalWidth, h: img.naturalHeight,
          // cleanup 由 compressPhoto finally 呼叫:drawImage 已用完 img、可安全移除 + revoke
          cleanup: () => { removeImg(); URL.revokeObjectURL(url); }
        }));
        img.onerror = () => finish(() => {
          removeImg();
          URL.revokeObjectURL(url);
          dlog("[load] OBJ_ONERROR");
          reject(new Error("IMAGE_LOAD_FAILED: onerror"));
        });
        img.src = url;
      });
    }

    function loadViaFileReader(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => {
          dlog("[load] FR_READER_ERROR");
          reject(new Error("FILEREADER_FAILED: reader.onerror"));
        };
        reader.onload = () => {
          // a7 三輪:dataURL 長度診斷(Samsung 雲端 stub 會讀出空 / 極短 result)
          const rlen = reader.result ? reader.result.length : 0;
          console.log("[loadRawImage] FileReader result length=" + (reader.result ? rlen : "null"));
          dlog("[load] FR result length=" + (reader.result ? rlen : "null"));
          if (!reader.result || rlen < 100) {
            dlog("[load] FR_EMPTY_RESULT");
            reject(new Error("FR_EMPTY_RESULT: " + (reader.result ? rlen : "null")));
            return;
          }
          const img = document.createElement("img");
          let settled = false;
          const finish = (fn) => { if (settled) return; settled = true; clearTimeout(t); fn(); };
          const t = setTimeout(() => finish(() => {
            dlog("[load] FR_IMG_TIMEOUT");
            reject(new Error("FILEREADER_FAILED: dataURL img timeout " + LOAD_IMAGE_TIMEOUT_MS + "ms"));
          }), LOAD_IMAGE_TIMEOUT_MS);
          img.onload = () => finish(() => resolve({
            source: img, w: img.naturalWidth, h: img.naturalHeight,
            cleanup: () => {}   // dataURL 不需 revoke
          }));
          img.onerror = () => finish(() => {
            dlog("[load] FR_IMG_ONERROR");
            reject(new Error("FILEREADER_FAILED: dataURL img onerror"));
          });
          img.src = reader.result;
        };
        try { reader.readAsDataURL(file); }
        catch (e) {
          dlog("[load] FR_READER_ERROR throw");
          reject(new Error("FILEREADER_FAILED: " + (e && e.message ? e.message : e)));
        }
      });
    }

    async function loadRawImage(file) {
      // Path 0: img.decode()(a7 八輪、最優先、瀏覽器原生解碼路徑)
      if (typeof HTMLImageElement !== "undefined" &&
          typeof HTMLImageElement.prototype.decode === "function") {
        dlog("[load] img.decode() 試...");
        try {
          return await loadViaDecode(file);
        } catch (e) {
          // dlog DECODE_FAILED 已在 loadViaDecode 內、繼續往 Path 1
          console.log("[loadRawImage] DECODE_FAILED, fallback to createImageBitmap", e);
        }
      } else {
        dlog("[load] img.decode unavailable");
      }

      // Path 1: createImageBitmap
      if (typeof createImageBitmap === "function") {
        dlog("[load] createImageBitmap 試...");
        try {
          const bmp = await createImageBitmap(file); // 預設 imageOrientation:'from-image'、已依 EXIF 轉正
          console.log("[loadRawImage] createImageBitmap OK");
          dlog("[load] createImageBitmap OK");
          return { source: bmp, w: bmp.width, h: bmp.height,
                   cleanup: () => { if (bmp.close) bmp.close(); } };
        } catch (e) {
          console.log("[loadRawImage] BITMAP_FAILED, fallback to Image()", e);
          dlog("[load] BITMAP_FAILED name=" + (e && e.name ? e.name : "?") + " msg=" + (e && e.message ? e.message : e));
        }
      } else {
        console.log("[loadRawImage] createImageBitmap unavailable, fallback to Image()");
        dlog("[load] createImageBitmap unavailable");
      }

      // Path 2: DOM-attached hidden <img> + objectURL(a7 五輪:Samsung 只有 DOM-attached 抓得到 blob)
      dlog("[load] objectURL(DOM-attached) 試...");
      try {
        const r = await loadViaObjectURL(file);
        console.log("[loadRawImage] Image fallback OK (DOM-attached)");
        dlog("[load] objectURL(DOM-attached) OK");
        return r;
      } catch (e) {
        console.log("[loadRawImage] IMAGE_LOAD_FAILED, fallback to FileReader", e);
        // 細分 tag(OBJ_ONERROR / OBJ_TIMEOUT)已在 loadViaObjectURL 內 dlog
      }

      // Path 3: FileReader → dataURL → Image(最後一層、相容性最高)
      console.log("[loadRawImage] using FileReader fallback");
      dlog("[load] FileReader 試...");
      try {
        const r = await loadViaFileReader(file);
        console.log("[loadRawImage] FileReader fallback OK");
        dlog("[load] FileReader OK");
        return r;
      } catch (e) {
        // 三層都掛、拋出最後一層的精確錯誤給上層;細分 tag 已在 loadViaFileReader 內 dlog
        throw (e instanceof Error ? e : new Error("FILEREADER_FAILED: " + e));
      }
    }

    async function compressPhoto(file) {
      // a7 三輪:Samsung 雲端 stub 防呆(規則 4)— 雲端未下載到本機時 file.size=0、三層 fallback 全破
      if (!file || file.size === 0) {
        throw new Error("EMPTY_FILE: size=" + (file ? file.size : "null"));
      }
      // D. HEIC 保險:input accept=image/* 在 iOS 13+ 通常已自動轉 JPEG、這裡只是極端保險
      if (/\.heic$/i.test(file.name || "")) {
        throw new Error("HEIC_NOT_SUPPORTED");
      }

      const orientation = await readExifOrientation(file); // 純診斷、方向 α 後不影響 canvas
      const { source, w: iw, h: ih, cleanup } = await loadRawImage(file);

      try {
        // source 已是「轉正後」像素(方向 α);長邊縮到 1080、不放大(scale ≤ 1)
        const scale = Math.min(1, PHOTO_MAX_EDGE / Math.max(iw, ih));
        const sw = Math.round(iw * scale);
        const sh = Math.round(ih * scale);

        const canvas = document.createElement("canvas");
        canvas.width  = sw;   // 不交換、不旋轉:瀏覽器已依 EXIF 轉正
        canvas.height = sh;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(source, 0, 0, sw, sh);

        const outW = canvas.width, outH = canvas.height;

        // 規則 9 診斷:orientation 純參考;canvas 應 == sw/sh(無旋轉、不交換)
        console.log("[photo-test:compress]", {
          orientation, sourceW: iw, sourceH: ih, sw, sh, canvasW: outW, canvasH: outH
        });

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            b => b ? resolve(b) : reject(new Error("CANVAS_TOBLOB_NULL")), // iOS 偶爾回 null
            "image/jpeg",
            PHOTO_JPEG_QUALITY
          );
        });

        // 記憶體釋放(規則 5 + iOS 老機防爆):canvas 歸零、bitmap/objectURL 在 finally
        canvas.width = canvas.height = 0;

        if (blob.size > PHOTO_MAX_BYTES) throw new Error("PHOTO_TOO_LARGE");

        return {
          blob,
          width: outW, height: outH,
          originalWidth: iw, originalHeight: ih,
          originalSize: file.size, compressedSize: blob.size,
          orientation
        };
      } finally {
        if (cleanup) cleanup();
      }
    }

    /* a7 九輪:從「已顯示成功的原圖預覽 img」直接畫 canvas、繞過所有 file→bytes 路徑。
       Samsung S21 Ultra 證據:原圖預覽 <img id="photoTestOriginal"> 顯示成功(遙控器圖完整出現),
       但同 file 走 loadViaDecode 新 img 卻 DECODE_FAILED: EncodingError。
       問題在「我們重新 createObjectURL + 重新 decode」,不是 file 本身。
       既有 compressPhoto + loadRawImage 四層當後備、不刪、Step 2b 再清。*/
    function waitDisplayImgReady(imgEl, timeoutMs) {
      return new Promise((resolve, reject) => {
        if (imgEl.complete && imgEl.naturalWidth > 0) { resolve(); return; }
        let settled = false;
        const cleanup = () => {
          imgEl.removeEventListener("load",  onLoad);
          imgEl.removeEventListener("error", onErr);
          clearTimeout(t);
        };
        const finish = (fn) => { if (settled) return; settled = true; cleanup(); fn(); };
        const t = setTimeout(() => finish(() => reject(new Error("DISPLAY_IMG_TIMEOUT"))),
                             timeoutMs || LOAD_IMAGE_TIMEOUT_MS);
        const onLoad = () => finish(() => {
          if (imgEl.naturalWidth > 0) resolve();
          else reject(new Error("DISPLAY_IMG_ZERO_DIM"));
        });
        const onErr  = () => finish(() => reject(new Error("DISPLAY_IMG_ONERROR")));
        imgEl.addEventListener("load",  onLoad);
        imgEl.addEventListener("error", onErr);
      });
    }

    async function compressFromImg(imgEl) {
      // imgEl 是已經載入顯示成功的 <img>(原圖預覽那個);直接 drawImage、不重讀 file
      const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
      if (!iw || !ih) throw new Error("IMG_NOT_READY");

      const scale = Math.min(1, PHOTO_MAX_EDGE / Math.max(iw, ih));
      const sw = Math.round(iw * scale);
      const sh = Math.round(ih * scale);

      const canvas = document.createElement("canvas");
      canvas.width = sw; canvas.height = sh;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(imgEl, 0, 0, sw, sh);   // 關鍵:直接畫已顯示的 img、不經過任何 file 讀取

      const outW = canvas.width, outH = canvas.height;
      console.log("[photo-test:compress-from-img]", { sourceW: iw, sourceH: ih, sw, sh, canvasW: outW, canvasH: outH });

      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(
          b => b ? resolve(b) : reject(new Error("CANVAS_TOBLOB_NULL")),
          "image/jpeg", PHOTO_JPEG_QUALITY
        );
      });
      canvas.width = canvas.height = 0;   // 規則 5
      if (blob.size > PHOTO_MAX_BYTES) throw new Error("PHOTO_TOO_LARGE");

      return {
        blob, width: outW, height: outH,
        originalWidth: iw, originalHeight: ih,
        originalSize: 0, compressedSize: blob.size,
        orientation: "(from displayed img)"
      };
    }

    /* ============================================================
       Task 5 Step 2b-4c:發貼文 Modal 全鏈 + 背景上傳 — 分享後立刻關 modal、上傳改背景 + 頂部進度條
       流程:分享 → snapshot(compressed Blob 本體 + caption)→ 立刻 closePostModal → runBackgroundUpload:
            差集 pre-seed → sequential 上傳 + claimNewFileId → addDoc posts(serverTimestamp)→
            members.postCount+1(+首次回填 driveFolderId)→ 頂部進度條 done/fail。
       並行防護 isBackgroundUploading:上傳中擋開新 modal(同時只能傳一篇、規則 4);失敗策略 B(重發)。
       後端 doPost 已支援照片(key "audio" + filename .jpg → image/jpeg、apps-script/istanda-mapasnava-receiver.gs)。
       上傳走新工具 postBlobToAppsScript + claimNewFileId、handleUpload 舊錄音一行不動(規則 9);
       compressFromImg / compressPhoto / loadRawImage 四層 / waitDisplayImgReady / readExifOrientation 一字未動。
       讀取端(Feed 顯示 posts)留 2b-5(規則 13:這輪只動寫入端)。
       ============================================================ */
    (function setupPostModal() {
      const entryBtn   = document.getElementById("postEntryBtn");
      const modal      = document.getElementById("postModal");
      if (!entryBtn || !modal) return;

      const backdrop   = document.getElementById("postModalBackdrop");
      const cancelBtn  = document.getElementById("postModalCancel");
      const closeBtn   = document.getElementById("postModalClose");
      const addEmpty   = document.getElementById("postAddPhotoEmpty");
      const strip      = document.getElementById("postPhotosStrip");
      const camInput   = document.getElementById("postCameraInput");
      const galInput   = document.getElementById("postGalleryInput");
      const caption    = document.getElementById("postCaption");
      const captionCnt = document.getElementById("postCaptionCount");
      const shareBtn   = document.getElementById("postShareBtn");

      const pickSheet  = document.getElementById("postPickSheet");
      const pickBack   = document.getElementById("postPickBackdrop");
      const pickCam    = document.getElementById("postPickCamera");
      const pickGal    = document.getElementById("postPickGallery");
      const pickCancel = document.getElementById("postPickCancel");

      const cloudSheet  = document.getElementById("postCloudFallback");
      const cloudBack   = document.getElementById("postCloudBackdrop");
      const cloudRetry  = document.getElementById("postCloudRetryCamera");
      const cloudCancel = document.getElementById("postCloudCancel");

      const CAPTION_MAX = 500;
      const POST_MAX_PHOTOS = 9;   // 一篇貼文照片上限(規則 1:給名字、之後改一處)
      // 已選照片暫存:每筆 { original:File(原始), compressed:Blob(壓縮後、2b-4 上傳用), previewUrl:string(縮圖) }。
      const postPhotos = [];
      let isBackgroundUploading = false;   // 2b-4c:背景上傳中旗標(同時只能傳一篇、規則 4)

      /* ---- 開關 ---- */
      function openPostModal() {
        if (isBackgroundUploading) { showToast("上一篇還在上傳、請稍候", 2600); return; } // 並行防護:擋第二篇(規則 4)
        modal.hidden = false;
        document.body.style.overflow = "hidden";   // 鎖背景捲動(規則 5:關閉時還原)
      }
      function closePostModal() {
        modal.hidden = true;
        closePickSheet();
        closeCloudFallback();
        clearPostPhotos();                         // 規則 5:離開清乾淨、釋放 objectURL
        caption.value = "";
        captionCnt.hidden = true;
        caption.style.height = "auto";
        document.body.style.overflow = "";
      }
      function openPickSheet()      { pickSheet.hidden = false; }
      function closePickSheet()     { if (pickSheet) pickSheet.hidden = true; }
      function showCloudPhotoFallback() { cloudSheet.hidden = false; } // 規則 4:NotReadableError 友善退路
      function closeCloudFallback() { if (cloudSheet) cloudSheet.hidden = true; }

      /* ---- 照片預覽 render / 刪除 / 清空 ---- */
      function renderPostPhotos() {
        strip.innerHTML = "";
        if (postPhotos.length === 0) {
          addEmpty.hidden = false;
          strip.hidden = true;
        } else {
          addEmpty.hidden = true;   // 有照片:大空狀態收起、改用預覽列(<9 張時末尾補「加更多」tile)
          strip.hidden = false;
          postPhotos.forEach((p, idx) => {
            const thumb = document.createElement("div");
            thumb.className = "post-photo-thumb";
            const img = document.createElement("img");
            img.src = p.previewUrl;
            img.alt = "照片預覽";
            const del = document.createElement("button");
            del.type = "button";
            del.className = "post-photo-thumb__del";
            del.setAttribute("aria-label", "刪除這張");
            del.textContent = "✕";
            del.addEventListener("click", () => removePhoto(idx));
            thumb.appendChild(img);
            thumb.appendChild(del);
            strip.appendChild(thumb);
          });
          // <9 張 → 末尾「＋ 加更多」tile;=9 張 → 不顯示(等於選照片入口 disabled)
          if (postPhotos.length < POST_MAX_PHOTOS) {
            const more = document.createElement("button");
            more.type = "button";
            more.className = "post-photo-thumb post-photo-thumb--add";
            more.setAttribute("aria-label", "加更多照片");
            more.textContent = "＋";
            more.addEventListener("click", openPickSheet);   // 重開 ActionSheet
            strip.appendChild(more);
          }
        }
        shareBtn.disabled = postPhotos.length === 0;   // 有照片才能分享
      }
      function removePhoto(idx) {
        const p = postPhotos[idx];
        if (p && p.previewUrl) URL.revokeObjectURL(p.previewUrl); // 規則 5:釋放 objectURL
        postPhotos.splice(idx, 1);
        renderPostPhotos();
      }
      function clearPostPhotos() {
        postPhotos.forEach(p => { if (p.previewUrl) URL.revokeObjectURL(p.previewUrl); });
        postPhotos.length = 0;
        renderPostPhotos();
      }

      /* ---- 拍照(單張)---- */
      function triggerCamera() {
        closeCloudFallback();
        closePickSheet();
        camInput.value = "";   // 清舊值、允許重拍同一張也觸發 change
        camInput.click();
      }
      camInput.addEventListener("change", async () => {
        const file = camInput.files && camInput.files[0];
        camInput.value = "";   // 立刻清、避免殘留
        if (!file) return;
        await handleCameraFile(file);
      });

      /* ---- 從相簿選(多張、可能踩 Android Photo Picker proxy)---- */
      function triggerGallery() {
        closePickSheet();
        galInput.value = "";   // 清舊值、允許重選同一批也觸發 change
        galInput.click();
      }
      galInput.addEventListener("change", async () => {
        const files = galInput.files ? Array.from(galInput.files) : [];
        galInput.value = "";   // 立刻清、避免殘留
        if (files.length === 0) return;
        await handleGalleryFiles(files);
      });

      // HEIF 判斷(type 或副檔名)
      function isHeic(file) {
        const t = (file.type || "").toLowerCase();
        const n = (file.name || "").toLowerCase();
        return t === "image/heic" || t === "image/heif" || n.endsWith(".heic") || n.endsWith(".heif");
      }
      // HEIF → JPEG(命中才轉、否則原樣回);heic2any 全域(CDN)
      async function maybeConvertHeic(file) {
        if (!isHeic(file)) return file;
        if (typeof heic2any !== "function") throw new Error("HEIC_LIB_MISSING");
        const out = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.9 });
        const jpeg = Array.isArray(out) ? out[0] : out;
        const newName = (file.name || "photo").replace(/\.(heic|heif)$/i, "") + ".jpg";
        return new File([jpeg], newName, { type: "image/jpeg" });
      }

      /* 用既有「已載入 img → drawImage」主路徑壓縮(Step 2a 驗證、compressFromImg/四層鏈不動):
         建臨時 img 載入 file、ready 後走 compressFromImg;失敗退回 compressPhoto(file) 四層鏈。 */
      async function compressViaDisplayedImg(file) {
        const url = URL.createObjectURL(file);
        const img = document.createElement("img");
        img.style.cssText = "position:absolute;left:-99999px;top:0;visibility:hidden;pointer-events:none;";
        img.src = url;
        document.body.appendChild(img);
        try {
          try {
            await waitDisplayImgReady(img);
            return await compressFromImg(img);
          } catch (displayErr) {
            console.warn("[photo] 主路徑 compressFromImg 失敗、退四層鏈:", displayErr && displayErr.message);
            return await compressPhoto(file);
          }
        } finally {
          if (img.parentNode) img.parentNode.removeChild(img);
          URL.revokeObjectURL(url);
        }
      }

      /* 單張處理核心(守門 → HEIF → 主路徑壓縮)。回傳結果物件、不直接碰 UI,
         讓單張(拍照)與多張(相簿)共用、各自決定怎麼提示(規則 2:不重寫流程)。
         回傳:{ status:"ok", photo } | { status:"cloud" }(NotReadableError)| { status:"error", reason } */
      async function buildPhotoEntry(file) {
        // a. arrayBuffer 守門(規則 4:NotReadableError 不漏網;Android proxy URI 在此攔下)
        try {
          await file.arrayBuffer();
        } catch (err) {
          if (err && err.name === "NotReadableError") return { status: "cloud" };
          return { status: "error", reason: (err && err.message) || "讀取失敗" };
        }
        // b. HEIF → JPEG
        let working;
        try {
          working = await maybeConvertHeic(file);
        } catch (e) {
          console.warn("[2b-3] HEIF 轉檔失敗:", e && e.message ? e.message : e);
          return { status: "error", reason: "HEIF 轉檔失敗" };
        }
        // c. compressFromImg 主路徑(既有四層鏈當後備、都不動)
        let result;
        try {
          result = await compressViaDisplayedImg(working);
        } catch (e) {
          console.error("[2b-3] 壓縮失敗:", e && e.message ? e.message : e);
          return { status: "error", reason: (e && e.message) || "壓縮失敗" };
        }
        // d. 成功:組 entry(previewUrl = 壓縮後 Blob 的 objectURL)
        const previewUrl = URL.createObjectURL(result.blob);
        return { status: "ok", photo: { original: file, compressed: result.blob, previewUrl } };
      }

      /* 拍照單張:沿用 2b-2 行為(雲端→退路、錯誤→toast、成功→push)。 */
      async function handleCameraFile(file) {
        if (!file) return;
        const res = await buildPhotoEntry(file);
        if (res.status === "cloud") { showCloudPhotoFallback(); return; }
        if (res.status === "error") { showToast("這張照片無法處理、請換一張或重拍", 3200); return; }
        postPhotos.push(res.photo);
        renderPostPhotos();
      }

      /* 相簿多張:sequential(for await、非 Promise.all、防記憶體爆)+ 失敗隔離(規則 4):
         某張任一步失敗 → 跳過那張、不留半成品、不中斷整批;跑完一次性彙整提示。
         超過剩餘空位只取前面幾張(連同已選的合計不超過 9)。 */
      async function handleGalleryFiles(files) {
        const remaining = POST_MAX_PHOTOS - postPhotos.length;
        if (remaining <= 0) { showToast("已達 9 張上限", 2600); return; }
        let batch = files;
        let truncated = false;
        if (batch.length > remaining) { batch = batch.slice(0, remaining); truncated = true; }

        let added = 0, cloudCount = 0, errorCount = 0;
        for (const file of batch) {            // sequential、一張一張
          const res = await buildPhotoEntry(file);
          if (res.status === "ok")         { postPhotos.push(res.photo); added++; renderPostPhotos(); }
          else if (res.status === "cloud") { cloudCount++; }
          else                             { errorCount++; }
        }

        const skipped = cloudCount + errorCount;
        if (added === 0) {
          // 全部沒進來:若全是 NotReadableError(proxy)→ 友善退路;否則泛用提示
          if (errorCount === 0 && cloudCount > 0) showCloudPhotoFallback();
          else showToast("這些照片都讀不到或無法處理、請換幾張或改用拍照", 3500);
          return;
        }
        const msgs = [];
        if (truncated)    msgs.push("最多 9 張、超過的沒加");
        if (skipped > 0)  msgs.push("有 " + skipped + " 張讀不到已跳過");
        if (msgs.length)  showToast(msgs.join("、") + "、其餘已加入", 3500);
      }

      /* ---- 入口 / 關閉 ---- */
      entryBtn.addEventListener("click", openPostModal);
      cancelBtn.addEventListener("click", closePostModal);
      closeBtn.addEventListener("click", closePostModal);
      backdrop.addEventListener("click", closePostModal);
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (!cloudSheet.hidden) { closeCloudFallback(); return; }
        if (!pickSheet.hidden)  { closePickSheet(); return; }
        if (!modal.hidden)      closePostModal();
      });

      /* ---- 加照片 ActionSheet ---- */
      addEmpty.addEventListener("click", openPickSheet);
      pickBack.addEventListener("click", closePickSheet);
      pickCancel.addEventListener("click", closePickSheet);
      pickCam.addEventListener("click", triggerCamera);   // 2b-2:接拍照
      pickGal.addEventListener("click", triggerGallery);  // 2b-3:接相簿多張

      /* ---- 雲端退路 sheet ---- */
      cloudBack.addEventListener("click", closeCloudFallback);
      cloudCancel.addEventListener("click", closeCloudFallback);
      cloudRetry.addEventListener("click", triggerCamera);

      /* ---- caption 計數 + 自動展開(maxlength=500 已硬限)---- */
      caption.addEventListener("input", () => {
        const len = caption.value.length;
        captionCnt.hidden = len === 0;
        captionCnt.textContent = len + " / " + CAPTION_MAX;
        captionCnt.classList.toggle("post-caption__count--over", len >= CAPTION_MAX);
        caption.style.height = "auto";
        caption.style.height = Math.min(caption.scrollHeight, 200) + "px";
      });

      /* 共用上傳小工具(規則 2/11:POST blind 那段抽出、handleUpload 舊錄音一行不動)。
         任意 blob(照片/音檔)→ base64 → POST。後端 doPost key 是 "audio"、從 filename 副檔名
         推 mimeType(.jpg→image/jpeg)、寫進該成員子資料夾。跨域 redirect 拿不到 response、
         不解析(blind)、fileId 由 claimNewFileId 撈。 */
      async function postBlobToAppsScript(blob, filename, memberId, memberName, folderId) {
        const base64 = await blobToBase64(blob);   // 既有共用、剝 data: 前綴回純 base64
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            audio: base64,
            filename,
            memberId,
            memberName: memberName || "",
            folderId: folderId || ""
          })
        });
      }

      /* 差集撈 fileId(現行 Step 1 雙模式形狀、非 spec 舊扁平 listData[memberId]):
         有 driveFolderId → 主路徑 data.files;無 → 保底 data.result[memberId]。
         retry 3 次間隔 500ms、找第一筆「fileId 不在 claimed 裡」的(同檔名多張靠 fileId 唯一分辨)。 */
      async function claimNewFileId(memberId, driveFolderId, claimed) {
        for (let attempt = 1; attempt <= 3; attempt++) {
          let files = [];
          try {
            if (driveFolderId) {
              const resp = await fetch(`${APPS_SCRIPT_URL}?action=list&folderId=${encodeURIComponent(driveFolderId)}`);
              const data = await resp.json();
              files = (data && data.files) || [];
            } else {
              const resp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
              const data = await resp.json();
              files = (data && data.result && data.result[memberId]) || [];
            }
          } catch (e) {
            console.warn("[photo] claim GET 失敗、retry " + attempt, e && e.message ? e.message : e);
          }
          const fresh = files.find(f => f.fileId && !claimed.includes(f.fileId));
          // parentFolderId 只有保底路徑帶(主路徑已知 folderId、不需回填);供首次發文回填 driveFolderId
          if (fresh) return { fileId: fresh.fileId, filename: fresh.filename, parentFolderId: fresh.parentFolderId };
          if (attempt < 3) await new Promise(r => setTimeout(r, 500));
        }
        throw new Error("CLAIM_FAILED");   // 3 次都沒撈到新 fileId
      }

      /* 差集 pre-seed(規則 4):上傳前先把資料夾現有 fileId 全 seed 進 claimed,
         否則資料夾若已有舊檔(錄音 / 之前的照片)、第一張會誤抓舊檔 fileId。
         ⚠️ 現行 Apps Script list 不按副檔名 / 類型過濾(回資料夾內全部檔)、所以錄音也要 seed。 */
      async function seedExistingFileIds(memberId, driveFolderId, claimed) {
        try {
          let files = [];
          if (driveFolderId) {
            const resp = await fetch(`${APPS_SCRIPT_URL}?action=list&folderId=${encodeURIComponent(driveFolderId)}`);
            const data = await resp.json();
            files = (data && data.files) || [];
          } else {
            const resp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
            const data = await resp.json();
            files = (data && data.result && data.result[memberId]) || [];
          }
          files.forEach(f => { if (f.fileId) claimed.push(f.fileId); });
        } catch (e) {
          console.warn("[2b-4b] pre-seed list 失敗、claimed 從空開始(風險:首張可能誤抓舊檔)", e && e.message ? e.message : e);
        }
      }

      /* ---- 頂部上傳進度條(modal 外、背景上傳用)---- */
      const uploadBar      = document.getElementById("uploadBar");
      const uploadBarText  = document.getElementById("uploadBarText");
      const uploadBarClose = document.getElementById("uploadBarClose");
      let uploadBarTimer = null;
      // state: "progress"(薑黃)/ "done"(綠、2 秒淡出)/ "fail"(紅、給手動關、不自動消失)
      function setUploadBar(state, text) {
        clearTimeout(uploadBarTimer);
        uploadBar.hidden = false;
        uploadBar.className = "upload-bar upload-bar--" + state;
        uploadBarText.textContent = text;
        uploadBarClose.hidden = (state !== "fail");
        if (state === "done") uploadBarTimer = setTimeout(() => { uploadBar.hidden = true; }, 2000);
      }
      if (uploadBarClose) uploadBarClose.addEventListener("click", () => { uploadBar.hidden = true; });

      /* ---- 背景上傳一篇貼文(modal 已關、讀 snapshot job、不碰已清空的 modal 狀態)----
         job = { blobs:[Blob], mId, mName, driveFolderId, caption }
         上傳迴圈 + 寫 DB 與 2b-4b 完全相同邏輯、只是搬到背景 + 頂部進度條(規則 9:邏輯不動)。 */
      async function runBackgroundUpload(job) {
        isBackgroundUploading = true;
        const total = job.blobs.length;
        const claimed = [];
        const uploaded = [];          // [{fileId, filename, parentFolderId?}]
        let backfillFolderId = null;
        try {
          setUploadBar("progress", `上傳中 0/${total}`);
          await seedExistingFileIds(job.mId, job.driveFolderId, claimed);   // 差集 pre-seed
          for (let i = 0; i < total; i++) {              // sequential、絕不 Promise.all
            setUploadBar("progress", `上傳中 ${i + 1}/${total}`);
            await postBlobToAppsScript(job.blobs[i], `${job.mId}.jpg`, job.mId, job.mName, job.driveFolderId); // 不重壓
            await new Promise(r => setTimeout(r, 300));   // 降 race、給 Drive 寫入緩衝
            const f = await claimNewFileId(job.mId, job.driveFolderId, claimed);
            claimed.push(f.fileId);
            uploaded.push(f);
            if (!job.driveFolderId && !backfillFolderId && f.parentFolderId) backfillFolderId = f.parentFolderId;
          }
          // 寫 Firestore posts + members(createdAt serverTimestamp、postCount+1、首次回填 driveFolderId)
          const photos = uploaded.map(u => ({ fileId: u.fileId, filename: u.filename })); // 對齊 schema
          await addDoc(collection(db, "posts"), {
            memberId: job.mId, photos, audioFileId: null, text: job.caption,
            createdAt: serverTimestamp(), likes: [], comments: []
          });
          const memberUpdate = { postCount: increment(1) };  // 舊文件無此欄位 → 自動從 0 起(規則 8)
          if (!job.driveFolderId && backfillFolderId) memberUpdate.driveFolderId = backfillFolderId;
          await updateDoc(doc(db, "members", job.mId), memberUpdate);
          if (!job.driveFolderId && backfillFolderId && memberData) memberData.driveFolderId = backfillFolderId;
          setUploadBar("done", "貼文已發布 ✅");
        } catch (err) {
          console.error("[2b-4c] 背景上傳失敗:", err && err.message ? err.message : err);
          setUploadBar("fail", "上傳失敗、請再試");
          // 失敗策略 = B(重發):丟棄 job(區域變數、return 後即釋放)、不自動重試。
          // 理由:naive 重傳同一批會在 Drive 製造重複檔(部分已上傳);重發 = 乾淨、可靠、簡單。
          // TODO(6/15 後):若要保留照片做可續傳重試,需記錄 uploaded 進度 + 跳過已傳,複雜、暫不做。
        } finally {
          isBackgroundUploading = false;   // 解旗標、允許下一篇
        }
      }

      /* ---- 分享 → 先關 modal + 清空 → 背景上傳(north-star:發完馬上能繼續滑)---- */
      shareBtn.addEventListener("click", () => {
        if (postPhotos.length === 0) return;
        if (isBackgroundUploading) { showToast("上一篇還在上傳、請稍候", 2600); return; } // 並行防護(規則 4)
        const mId = memberId;
        if (!mId) { showToast("找不到成員、請重新整理頁面再試", 3000); return; }
        // snapshot:存 compressed Blob 本體(背景上傳要用、不 revoke)+ caption + member 資訊。
        // ⚠️ closePostModal 會 revoke previewUrl(縮圖 objectURL)、但不動 compressed Blob 本體、job 仍可用。
        const job = {
          blobs: postPhotos.map(p => p.compressed),
          mId,
          mName: (memberData && memberData.name) || "",
          driveFolderId: (memberData && memberData.driveFolderId) || "",
          caption: caption.value || ""
        };
        closePostModal();          // 立刻關 + 清 postPhotos(revoke previewUrl)+ 清 caption + render 回空
        runBackgroundUpload(job);  // 不 await、背景跑、頂部進度條顯示
      });

      renderPostPhotos();   // 初始:空狀態 + 分享 disabled
    })();

    /* ============================================================
       Task 5:個人頁「貼文」tab — 此成員 posts 渲染
       規則 11 判斷(任務 0):首頁 createPostCard 在 script.js(另一支 module、已驗證運作),
       真正共用得 import 進 script.js = 動到首頁運作中程式(規則 9 禁區);member.html 又是
       單一作者(author 固定 = memberData)、且已有自己的 escapeHtml/formatCommentTime/APPS_SCRIPT_URL。
       → 採規則 11「複製一份 member 版 + TODO」、不動首頁。
       TODO(6/15 後):若要統一,把 post-card 渲染抽成共用 ES module 給兩頁 import。
       ============================================================ */
    function postTimeMs(ts) {   // 排序用:Firestore Timestamp / Date / number → ms
      if (!ts) return 0;
      const d = ts.toDate ? ts.toDate() : (ts.seconds != null ? new Date(ts.seconds * 1000) : new Date(ts));
      return d.getTime() || 0;
    }

    /* VC-5:個人頁貼文即時化(onSnapshot + docChanges、跟 VC-4 首頁同邏輯)。
       只改貼文這份、recordings 那份(setupRecordingsListener)不動。 */
    let memberPostsUnsub = null;
    function loadMemberPosts() {
      const listEl = document.getElementById("memberPostsList");
      if (!listEl || !memberId) return;
      ensureMembersLoaded().catch(() => {});   // 背景載入成員、供留言身分名稱解析(不阻塞)
      if (memberPostsUnsub) { memberPostsUnsub(); memberPostsUnsub = null; }

      const photoIO = new IntersectionObserver((entries, obs) => {
        entries.forEach(en => { if (en.isIntersecting) { obs.unobserve(en.target); loadMemberPostPhoto(en.target); } });
      }, { rootMargin: "300px" });

      let first = true;
      let usingClientSort = false;

      function emptyIfNone() {
        if (listEl.querySelectorAll(".post").length === 0) {
          listEl.innerHTML = `<div class="recordings-empty">還沒有貼文</div>`;
        }
      }

      const onSnap = (snap) => {
        const placeholder = listEl.querySelector(".recordings-empty");
        if (placeholder) placeholder.remove();

        if (usingClientSort) {
          // 退化路徑(沒建複合索引):newIndex 不可靠 → 用 client 排序重建清單(規則 4)
          const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => postTimeMs(b.createdAt) - postTimeMs(a.createdAt));
          renderMemberPosts(posts);
        } else {
          const deviceId = getDeviceId();
          snap.docChanges().forEach(change => {
            const post = { id: change.doc.id, ...change.doc.data() };
            if (change.type === "added") {
              const card = createMemberPostCard(post, deviceId);
              const cards = listEl.querySelectorAll(".post");
              if (change.newIndex >= cards.length) listEl.appendChild(card);
              else listEl.insertBefore(card, cards[change.newIndex]);
              card.querySelectorAll("img[data-photo-fileid]").forEach(ph => photoIO.observe(ph));   // 只有新卡才抓照片(每張 slide)
            } else if (change.type === "modified") {
              const card = listEl.querySelector(`.post[data-post-id="${post.id}"]`);
              if (card) updateMemberPostStats(card, post, deviceId);   // 就地、不重建、不碰照片
            } else if (change.type === "removed") {
              const card = listEl.querySelector(`.post[data-post-id="${post.id}"]`);
              if (card) card.remove();
            }
          });
        }

        emptyIfNone();
        if (first) { first = false; handleMemberPostDeepLink(); }
      };

      const onErrClientSort = (err) => {
        console.warn("[member posts] onSnapshot(client排序) 失敗:", err && err.message ? err.message : err);
        emptyIfNone();
      };

      const onErr = (err) => {
        // 索引未建 → 退回只 where + client 排序(重建式 render、規則 4)
        if (!usingClientSort && err && (err.code === "failed-precondition" || /index/i.test(err.message || ""))) {
          console.warn("[member posts] 複合查詢 onSnapshot 失敗(可能未建索引)、退回 client 排序:", err.message);
          usingClientSort = true;
          first = true;
          if (memberPostsUnsub) { memberPostsUnsub(); }
          memberPostsUnsub = onSnapshot(
            query(collection(db, "posts"), where("memberId", "==", memberId)),
            onSnap, onErrClientSort
          );
          return;
        }
        console.warn("[member posts] onSnapshot 失敗:", err && err.message ? err.message : err);
        emptyIfNone();
      };

      memberPostsUnsub = onSnapshot(
        query(collection(db, "posts"), where("memberId", "==", memberId), orderBy("createdAt", "desc")),
        onSnap, onErr
      );
    }

    /* VC-5 modified 就地更新:讚數/留言數用 snapshot 絕對值、不累加;
       愛心依 likes 有沒有我的 deviceId 重算(不呼叫 script.js 的 updatePostCardStats、自己一份、同口徑)。 */
    function updateMemberPostStats(card, post, deviceId) {
      const likes = Array.isArray(post.likes) ? post.likes : [];
      const comments = Array.isArray(post.comments) ? post.comments : [];
      const likeCount = card.querySelector(".post-like-count");
      const commentCount = card.querySelector(".post-comment-count");
      const likeBtn = card.querySelector(".post-like-btn");
      if (likeCount) likeCount.textContent = String(likes.length);
      if (commentCount) commentCount.textContent = String(comments.length);
      if (likeBtn) {
        const liked = likes.includes(deviceId);
        likeBtn.textContent = liked ? "❤️" : "🤍";
        likeBtn.setAttribute("aria-pressed", liked ? "true" : "false");
      }
    }

    /* 深連結:#post={postId}(相容舊 ?post=)→ 開那篇(個人頁版)。在貼文清單裡 → scroll + 高亮;
       不在 → getDoc 單獨抓 prepend;找不到 → toast(規則 4)。 */
    async function handleMemberPostDeepLink() {
      const pid = getDeepLinkPostId();
      if (!pid) return;
      const listEl = document.getElementById("memberPostsList");
      if (!listEl) return;
      let card = listEl.querySelector(`.post[data-post-id="${pid}"]`);
      if (!card) {
        try {
          const snap = await getDoc(doc(db, "posts", pid));
          if (!snap.exists()) { showToast("這篇貼文找不到了"); clearDeepLinkPostId(); return; }
          const post = { id: snap.id, ...snap.data() };
          card = createMemberPostCard(post, getDeviceId());
          const empty = listEl.querySelector(".recordings-empty");
          if (empty) empty.remove();
          listEl.insertBefore(card, listEl.firstChild);
          // 單獨抓的卡片沒掛 observer、直接載(多張 slide 全載、單一卡片可接受)
          card.querySelectorAll("img[data-photo-fileid]").forEach(ph => loadMemberPostPhoto(ph));
        } catch (err) {
          console.warn("[member posts] 深連結載入失敗:", err && err.message ? err.message : err);
          showToast("這篇貼文找不到了"); clearDeepLinkPostId(); return;
        }
      }
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      card.classList.add("post--highlight");
      setTimeout(() => card.classList.remove("post--highlight"), 2000);
      clearDeepLinkPostId();
    }

    function renderMemberPosts(posts) {
      const listEl = document.getElementById("memberPostsList");
      if (!listEl) return;
      listEl.innerHTML = "";
      if (!posts || posts.length === 0) {
        listEl.innerHTML = `<div class="recordings-empty">還沒有貼文</div>`;
        return;
      }
      // 照片 lazy:可視才向 ?id= 代理抓 base64(效能:照片代理較重)
      const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(en => { if (en.isIntersecting) { obs.unobserve(en.target); loadMemberPostPhoto(en.target); } });
      }, { rootMargin: "300px" });
      const deviceId = getDeviceId();   // 沿用 Task 3 既有 getDeviceId(同 key、跨頁一致)
      posts.forEach(p => {
        const card = createMemberPostCard(p, deviceId);
        listEl.appendChild(card);
        card.querySelectorAll("img[data-photo-fileid]").forEach(ph => io.observe(ph));
      });
    }

    /* 此頁單一作者:author 固定 = memberData(不需 members map)。
       重用既有 escapeHtml + formatCommentTime;照片走 ?id= 代理(同錄音、私有檔擁有者讀)。 */
    function createMemberPostCard(post, deviceId) {
      const article = document.createElement("article");
      article.className = "post";
      article.setAttribute("data-post-id", post.id || "");   // 深連結 scroll 用
      const authorName = (memberData && (memberData.name || memberData.nickname)) || "家人";
      const authorInitials = (memberData && memberData.initials) || "??";
      const photos = Array.isArray(post.photos) ? post.photos : [];
      // 照片輪播:橫向 scroll-snap、每張一個 slide(CSS 共用 style.css 的 .post__carousel/.post__slide)
      const mediaHtml = photos.length > 0
        ? `<div class="post__carousel">
             ${photos.map(p => `<div class="post__slide"><img data-photo-fileid="${escapeHtml(p.fileId)}" alt="${escapeHtml(authorName)} 的照片" /></div>`).join("")}
           </div>
           ${photos.length > 1 ? `<span class="post__photo-count" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;padding:2px 9px;border-radius:11px;">1/${photos.length}</span>` : ""}`
        : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;">(這篇沒有照片)</div>`;
      article.innerHTML = `
        <header class="post__header">
          <div class="post__user">
            <div class="post__avatar-ring"><div class="post__avatar-inner">
              <div class="post__avatar">${escapeHtml(authorInitials)}</div>
            </div></div>
            <div class="post__meta"><span class="post__name">${escapeHtml(authorName)}</span></div>
          </div>
        </header>
        <div class="post__media">${mediaHtml}</div>
        <div class="post__body">
          <div class="post__likes">
            <button class="post-like-btn" aria-label="按讚" style="background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1;vertical-align:-3px;">🤍</button>
            <span class="post-like-count">0</span> 個讚
            · <button class="post-comment-btn" aria-label="留言" style="background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1;vertical-align:-3px;">💬</button>
            <span class="post-comment-count">0</span> 則留言
            · <button class="post-share-btn" aria-label="分享" style="background:none;border:none;cursor:pointer;font-size:15px;padding:0;line-height:1;vertical-align:-1px;color:var(--text-soft);">↗️ 分享</button>
          </div>
          ${post.text ? `<p class="post__caption"><span class="post__caption-author">${escapeHtml(authorName)}</span> <span>${escapeHtml(post.text)}</span></p>` : ""}
          <p class="post__time">${formatCommentTime(post.createdAt)}</p>
        </div>
      `;
      // 照片輪播:橫滑時更新「目前/總數」角標(多張才有)
      if (photos.length > 1) {
        const carousel = article.querySelector(".post__carousel");
        const countEl = article.querySelector(".post__photo-count");
        if (carousel && countEl) {
          carousel.addEventListener("scroll", () => {
            const idx = Math.round(carousel.scrollLeft / carousel.clientWidth);
            countEl.textContent = `${Math.min(photos.length, idx + 1)}/${photos.length}`;
          }, { passive: true });
        }
      }

      // ❤️ 接共用 wireLikeButton(樂觀更新 + 寫失敗還原、規則 4)
      wireLikeButton({
        btn: article.querySelector(".post-like-btn"),
        countEl: article.querySelector(".post-like-count"),
        db, postId: post.id, likes: post.likes, deviceId,
        onError: () => showToast("按讚失敗、請再試")
      });
      // 💬 接共用 wireCommentButton(身分用 member 既有 getMyId / myCachedMembers / openIdentityModalLocal)
      wireCommentButton({
        btn: article.querySelector(".post-comment-btn"),
        countEl: article.querySelector(".post-comment-count"),
        db, post,
        appsScriptUrl: APPS_SCRIPT_URL,   // VC-3a:語音留言上傳
        getIdentity: () => {
          const id = getMyId(); if (!id) return null;
          const me = myCachedMembers.find(m => m.id === id);
          return { memberId: id, authorName: (me && (me.name || me.nickname)) || "家人" };
        },
        ensureIdentity: async (cb) => { await ensureMembersLoaded(); openIdentityModalLocal(() => cb()); },
        showToast
      });
      // ↗️ 接共用 wireShareButton(連結帶 ?id= 與 #post=、Web Share API → LINE 退路)
      wireShareButton({ btn: article.querySelector(".post-share-btn"), post, authorName });
      // ⋯ 刪除選單(6-2:只在自己貼文 memberId===getMyId() 時掛、與首頁共用一支)
      wirePostDeleteMenu({ article, post, db, getMyId, appsScriptUrl: APPS_SCRIPT_URL, showToast });
      return article;
    }

    async function loadMemberPostPhoto(imgEl) {
      const fileId = imgEl.getAttribute("data-photo-fileid");
      if (!fileId) return;
      try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?id=${encodeURIComponent(fileId)}`);
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const base64 = await resp.text();
        if (!base64 || base64.length < 50) throw new Error("empty");
        imgEl.src = `data:image/jpeg;base64,${base64}`;   // 照片一律 jpeg
      } catch (err) {
        console.warn("[member posts] 照片載入失敗 fileId=" + fileId, err && err.message ? err.message : err);
        const media = imgEl.closest(".post__media");
        if (media) media.innerHTML =
          `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px;">照片載入失敗</div>`;
      }
    }

    /* tab 切換(預設貼文)。純錄音 pane = 既有 recordings-section、JS 邏輯一行不動、只切 hidden */
    (function setupMemberTabs() {
      const tabPosts  = document.getElementById("tabPosts");
      const tabRec    = document.getElementById("tabRecordings");
      const postsPane = document.getElementById("postsPane");
      const recPane   = document.getElementById("recordingsPane");
      if (!tabPosts || !tabRec || !postsPane || !recPane) return;
      function activate(which) {
        const posts = which === "posts";
        postsPane.hidden = !posts;
        recPane.hidden = posts;
        tabPosts.classList.toggle("member-tab--active", posts);
        tabRec.classList.toggle("member-tab--active", !posts);
      }
      tabPosts.addEventListener("click", () => activate("posts"));
      tabRec.addEventListener("click", () => activate("recordings"));
    })();

    main();
  </script>

  <!-- PWA Service Worker 註冊 + 自動更新(Task 6) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          reg.update();
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(e => console.error('[SW] 註冊失敗', e));
      });
      // 新版 SW 接管 → 自動 reload(解「要清資料才看到新版」)
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
    }
  </script>
