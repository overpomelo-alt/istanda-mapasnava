<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>個人頁面 · Istanda Mapasnava</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ============================================================
       MEMBER PAGE · Hero / 錄音區 placeholder / 清單 placeholder
       全部走 :root 的 CSS 變數,漸層只用「限動五色」+「強調動作」兩條
       ============================================================ */

    /* ===== 「← 回首頁」icon button (對齊 .icon-btn 風格) ===== */
    .back-btn {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      color: var(--text);
      transition: background 0.15s, transform 0.15s;
    }
    .back-btn:hover { background: var(--bg-soft); }
    .back-btn:active { transform: scale(0.92); }
    .back-btn svg { width: 24px; height: 24px; }

    .app-header__title-mid {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .app-header__spacer { width: 40px; flex-shrink: 0; }

    /* ===== Hero 區(v2 翻盤:純白、靠 ring 五色當主視覺、米色細邊分隔下方錄音區)===== */
    .member-hero {
      background: var(--bg-elevated);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 16px 20px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    /* 限動五色漸層 ring,沿用 .story__ring 邏輯但放大到 hero 等級 */
    .member-hero__ring {
      width: 82px; height: 82px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      flex-shrink: 0;
    }
    .member-hero__ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #4a4a4a, #6b6b6b);
    }
    .member-hero__avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4a4a4a, #6b6b6b);
      letter-spacing: 0.02em;
    }

    .member-hero__text { flex: 1; min-width: 0; }
    .member-hero__name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .member-hero__nick {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .member-hero__count {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* ===== 錄音區（子步 3a:狀態機 + 60 秒自動停 + 權限 UX、不上傳）===== */
    .record-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 32px 16px 24px;
      text-align: center;
    }
    .section-title {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }
    .record-btn {
      width: 100px; height: 100px;
      margin: 0 auto;
      border-radius: 50%;
      background: linear-gradient(135deg, #f09433, #dc2743);
      display: flex; align-items: center; justify-content: center;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s;
    }
    .record-btn:active { transform: scale(0.94); }
    .record-btn svg {
      width: 40px; height: 40px;
      color: #fff;
    }
    /* 錄音中:spec line 118 拍板紅 #d04848 + pulse 動畫 */
    .record-btn--recording {
      background: #d04848;
      animation: record-pulse 1.4s ease-in-out infinite;
    }
    @keyframes record-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(208, 72, 72, 0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(208, 72, 72, 0); }
    }
    .record-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .record-hint--recording { color: #d04848; }

    /* ===== 試聽區（子步 3b:三按鈕橫排、預設 hidden、錄完才出現）===== */
    .playback-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 16px 24px;
      text-align: center;
    }
    .playback-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      max-width: 360px;
      margin: 0 auto;
    }
    .playback-btn {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .playback-btn:active { transform: scale(0.96); }
    .playback-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .playback-btn:disabled:active { transform: none; }
    /* 試聽（spec line 126:bg-elevated + text）*/
    .playback-btn--play {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    /* 重錄（spec line 127:透明 + border）*/
    .playback-btn--reset {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    /* 上傳（spec line 128:強調動作漸層 + 白字、子步 3c 才接邏輯、現在 disabled）*/
    .playback-btn--upload {
      background: linear-gradient(135deg, #f09433, #dc2743);
      color: #fff;
      border: none;
    }
    .playback-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== 上傳進度橫條(子步 3c.3:四段式視覺回饋、取代單行 toast)===== */
    .progress-toast {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 320px;
      background: rgba(26, 26, 26, 0.92);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease-out;
      z-index: 1100;
    }
    .progress-toast--show { opacity: 1; }
    .progress-toast__row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      gap: 12px;
    }
    .progress-toast__label {
      color: #f4f1ea;
      font-size: 14px;
      font-weight: 500;
    }
    .progress-toast__hint {
      color: rgba(244, 241, 234, 0.6);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .progress-toast__track {
      height: 4px;
      background: rgba(244, 241, 234, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-toast__fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f58529, #dd2a7b);
      border-radius: 2px;
      transition: width 0.4s ease-out, background 0.25s ease-out;
    }
    .progress-toast__fill--error { background: var(--like-red); }

    /* ===== 過去錄音清單(子步 4a:fetch + render + Hero N 改用清單長度)===== */
    .recordings-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .recordings-empty {
      text-align: center;
      padding: 24px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    /* 子步 3a:雙行 row(M_R3 B 拍板 IG / FB 風格)*/
    .recording-row {
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .recording-row:last-child { border-bottom: none; }
    .recording-row__top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .recording-row__bottom {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      padding-left: 34px; /* 對齊上行 🎵 icon + gap */
    }
    /* 子步 3a:❤️ / 💬 互動鈕、整個 button 都是 tap 區(M_R3 加分) */
    .recording-row__action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      background: transparent;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .recording-row__action:hover { background: var(--bg-soft); }
    .recording-row__action:active { transform: scale(0.96); }
    .recording-row__action svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linejoin: round;
    }
    /* ❤️ 按讚:idle 灰外框、liked 紅實心(IG 經典 var(--like-red))*/
    .recording-row__like--liked {
      color: var(--like-red);
    }
    .recording-row__like--liked svg {
      fill: var(--like-red);
      stroke: var(--like-red);
    }
    .recording-row__icon {
      font-size: 22px;
      flex-shrink: 0;
      line-height: 1;
    }
    .recording-row__text {
      flex: 1;
      min-width: 0;
    }
    .recording-row__date {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .recording-row__index {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    /* 黑色圓形播放鈕(spec line 158)、子步 4b 三態:idle ▶ / loading ⌛ / playing ⏸ */
    .recording-row__play {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      font-size: 13px;
      line-height: 1;
      transition: transform 0.15s, background 0.25s;
    }
    .recording-row__play:active { transform: scale(0.92); }
    .recording-row__play:disabled { cursor: wait; }
    .recording-row__play:disabled:active { transform: none; }
    /* loading:米灰底 + ⌛ */
    .recording-row__play--loading {
      background: var(--text-muted);
    }
    /* playing:強調漸層 + ⏸(spec line 159)*/
    .recording-row__play--playing {
      background: linear-gradient(135deg, #f09433, #dc2743);
    }

    /* ===== 友善錯誤畫面 ===== */
    .error-screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      background: var(--bg);
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }
    .error-screen__icon { font-size: 48px; line-height: 1; opacity: 0.6; }
    .error-screen__title {
      font-size: 18px; font-weight: 600;
      color: var(--text);
    }
    .error-screen__msg {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }
    .error-screen__home {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 22px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .error-screen__home:active { transform: scale(0.96); }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <!-- ============ MAIN APP CONTENT ============ -->
  <div id="appContent">

    <!-- Sticky header:← / 族名 / spacer -->
    <header class="app-header">
      <div class="app-header__inner">
        <button class="back-btn" aria-label="回首頁" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <div class="app-header__title-mid" id="headerTitle">成員頁面</div>
        <div class="app-header__spacer"></div>
      </div>
    </header>

    <main class="app-main">

      <!-- Hero -->
      <section class="member-hero">
        <div class="member-hero__ring">
          <div class="member-hero__ring-inner">
            <div class="member-hero__avatar" id="heroAvatar">--</div>
          </div>
        </div>
        <div class="member-hero__text">
          <div class="member-hero__name" id="heroName">載入中…</div>
          <div class="member-hero__nick" id="heroNick"></div>
          <div class="member-hero__count" id="heroCount">0 則錄音</div>
        </div>
      </section>

      <!-- 錄音區（子步 3a:狀態機 + 60 秒自動停 + 權限 UX、不上傳）-->
      <section class="record-section">
        <div class="section-title">🎙 錄一段話</div>
        <button class="record-btn" id="recordBtn" aria-label="開始錄音">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <div class="record-hint" id="recordHint">點麥克風開始錄音</div>
      </section>

      <!-- 試聽區（子步 3b:三按鈕橫排、預設 hidden、錄完才出現）-->
      <section class="playback-section" id="playbackSection" hidden>
        <audio id="playbackAudio" preload="auto"></audio>
        <div class="playback-row">
          <button class="playback-btn playback-btn--play"   id="playBtn"   aria-label="試聽">▶ 試聽</button>
          <button class="playback-btn playback-btn--reset"  id="resetBtn"  aria-label="重錄">↻ 重錄</button>
          <button class="playback-btn playback-btn--upload" id="uploadBtn" aria-label="上傳">☁ 上傳</button>
        </div>
        <div class="playback-hint" id="playbackHint">錄好了、確認後上傳</div>
      </section>

      <!-- 過去錄音清單(子步 4a:fetch ?action=list + render、子步 4b:點播放)-->
      <section class="recordings-section">
        <div class="section-title">過去錄音</div>
        <audio id="recordingsAudio" preload="auto"></audio>
        <div id="recordingsList">
          <div class="recordings-empty">清單載入中…</div>
        </div>
      </section>

    </main>

    <!-- 底部 nav:錄音 tab active -->
    <nav class="bottom-nav">
      <a class="nav-btn" href="index.html" aria-label="首頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </a>
      <button class="nav-btn" aria-label="搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="nav-btn nav-btn--record nav-btn--active" aria-label="錄音記事">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <button class="nav-btn" aria-label="家族成員">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <button class="nav-btn" aria-label="我">
        <div class="nav-avatar">ME</div>
      </button>
    </nav>
  </div>

  <!-- ============ 友善錯誤畫面 (預設藏起來) ============ -->
  <div id="errorScreen" class="error-screen" hidden>
    <div class="error-screen__icon">🤔</div>
    <div class="error-screen__title" id="errorTitle">找不到這位成員</div>
    <div class="error-screen__msg" id="errorMsg">這個連結可能壞掉了,回首頁挑一位試試。</div>
    <a class="error-screen__home" href="index.html">← 回首頁</a>
  </div>

  <!-- ============ 全域 Toast (複用 style.css 的 .global-toast) ============ -->
  <div id="globalToast" class="global-toast"></div>

  <!-- ============ Firebase + 應用邏輯 ============ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore, doc, getDoc, getDocs,
      collection, addDoc, updateDoc, serverTimestamp, increment,
      query, where, onSnapshot, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2Ek81mDL1SGBe-6S6PHEs4M8a-H6PqzA",
      authDomain: "istanda-mapasnava.firebaseapp.com",
      projectId: "istanda-mapasnava",
      storageBucket: "istanda-mapasnava.firebasestorage.app",
      messagingSenderId: "924639525790",
      appId: "1:924639525790:web:9e5b1e8e2674620c71748f",
      measurementId: "G-WSST40SJF3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Apps Script 上傳端點(Step 1 已部署、回 {ok, fileId, filename})
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAglNgdZo-KCyRaOYWRjrNhIQvjRC8exQn_ATqX7ozvTCKRsCTqLsWwAJDVEcKZQYnoQ/exec";

    // Module-level state(子步 3c 上傳邏輯要用)
    let memberId = null;          // main() 從 URL 拿
    let localRecordCount = 0;     // renderHero init、上傳成功本地 +1(N2 拍板)

    // Task 3 子步 3a:deviceId(防按讚重複按、跟「我是誰」分開)
    const DEVICE_ID_KEY = "istanda_device_id";
    function getDeviceId() {
      let id = localStorage.getItem(DEVICE_ID_KEY);
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem(DEVICE_ID_KEY, id);
      }
      return id;
    }

    function showError(title, msg) {
      document.getElementById("appContent").hidden = true;
      if (title) document.getElementById("errorTitle").textContent = title;
      if (msg) document.getElementById("errorMsg").textContent = msg;
      document.getElementById("errorScreen").hidden = false;
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = "index.html";
    });

    function renderHero(m) {
      const fallbackInitials = (m.name || "?").slice(0, 2).toUpperCase();
      document.getElementById("heroAvatar").textContent = m.initials || fallbackInitials;
      document.getElementById("heroName").textContent = m.name || "(無族名)";
      document.getElementById("heroNick").textContent = m.nickname || "";
      // 子步 3c 改:從 Firestore 讀 m.recordCount(雙寫的快取值)、上傳成功會本地 +1
      // (Step 4 會改成讀「過去錄音清單長度」為真、recordCount 仍雙寫但顯示用清單長度為準)
      localRecordCount = m.recordCount || 0;
      document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
      document.getElementById("headerTitle").textContent = m.name || "成員頁面";
      document.title = `${m.name || "成員"} · Istanda Mapasnava`;
    }

    async function main() {
      memberId = new URLSearchParams(window.location.search).get("id");
      if (!memberId) {
        showError("缺少成員 ID", "這個頁面要從首頁點某位家人才會進得來,回首頁挑一位吧。");
        return;
      }
      try {
        const snap = await getDoc(doc(db, "members", memberId));
        if (!snap.exists()) {
          showError("找不到這位成員", "這個連結可能壞掉了,或這位成員還沒建好。回首頁挑一位試試。");
          return;
        }
        renderHero(snap.data());
        loadRecordings();           // 子步 4a:Apps Script 初始一次性 load(F_R2 拍板)
        setupRecordingsListener();  // 子步 3a:onSnapshot 接管後續更新(likes / comments / 新文件)
      } catch (err) {
        console.error(err);
        showError("連線出問題", "讀不到家族資料,請檢查網路後重新整理。");
      }
    }

    /* ============================================================
       子步 3a:錄音狀態機 + 60 秒自動停 + 權限 UX(不上傳)
       拍板對應:Q2 mimeType 動態偵測、Q4 麥克風權限友善提示、Q6 60 秒自動停
       ============================================================ */

    function showToast(msg, ms = 2200) {
      const toast = document.getElementById("globalToast");
      if (!toast) return;
      toast.textContent = msg;
      toast.classList.add("global-toast--show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove("global-toast--show"), ms);
    }

    /* 子步 3c.3:上傳四段進度橫條(取代 handleUpload 內單行 toast、其他 showToast 用途保留)
       stage: encode/post/get/firestore/success/error
       percent: 0-100、傳 null 不改寬度(失敗時用、停在當前寬)
       hint: 覆蓋右側提示文字、傳 undefined 用 preset 預設 */
    let progressHideTimer = null;
    function showProgressToast(stage, percent, hint) {
      let toast = document.getElementById("progressToast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "progressToast";
        toast.className = "progress-toast";
        toast.innerHTML = `
          <div class="progress-toast__row">
            <span class="progress-toast__label"></span>
            <span class="progress-toast__hint"></span>
          </div>
          <div class="progress-toast__track">
            <div class="progress-toast__fill"></div>
          </div>`;
        document.body.appendChild(toast);
      }
      const presets = {
        encode:    { text: "☁ 編碼中...",     defaultHint: "1/3",      error: false },
        post:      { text: "☁ 上傳到雲端...", defaultHint: "2/3",      error: false },
        get:       { text: "☁ 確認中...",     defaultHint: "3/3",      error: false },
        firestore: { text: "☁ 寫入家族...",   defaultHint: "即將完成", error: false },
        success:   { text: "✅ 上傳成功!",    defaultHint: "",         error: false },
        error:     { text: "⚠ 上傳失敗、請重試", defaultHint: "",      error: true  },
      };
      const preset = presets[stage];
      if (!preset) return;

      const label  = toast.querySelector(".progress-toast__label");
      const hintEl = toast.querySelector(".progress-toast__hint");
      const fill   = toast.querySelector(".progress-toast__fill");

      label.textContent = preset.text;
      const hintText = (typeof hint === "string") ? hint : preset.defaultHint;
      hintEl.textContent = hintText;
      hintEl.style.display = hintText ? "" : "none";
      if (percent !== null && percent !== undefined) {
        fill.style.width = `${percent}%`;
      }
      fill.classList.toggle("progress-toast__fill--error", preset.error);
      toast.classList.add("progress-toast--show");

      if (progressHideTimer) { clearTimeout(progressHideTimer); progressHideTimer = null; }
      if (stage === "success" || stage === "error") {
        progressHideTimer = setTimeout(() => {
          toast.classList.remove("progress-toast--show");
          // 淡出後 reset 寬度跟錯誤態、避免下次顯示時殘留
          progressHideTimer = setTimeout(() => {
            fill.style.width = "0%";
            fill.classList.remove("progress-toast__fill--error");
          }, 300);
        }, 1500);
      }
    }

    function pickMimeType() {
      if (typeof MediaRecorder === "undefined") return null;
      if (MediaRecorder.isTypeSupported("audio/webm")) return { mime: "audio/webm", ext: "webm" };
      if (MediaRecorder.isTypeSupported("audio/mp4"))  return { mime: "audio/mp4", ext: "mp4" };
      return null;
    }

    const RECORD_LIMIT_SEC = 60;
    const recordBtn  = document.getElementById("recordBtn");
    const recordHint = document.getElementById("recordHint");

    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedBlob   = null;   // 子步 3b 接試聽會用
    let recordedExt    = "webm"; // 子步 3c 接上傳會用
    let countdownTimer = null;
    let autoStopTimer  = null;
    let secElapsed     = 0;

    function updateCountdownText() {
      const mm = String(Math.floor(secElapsed / 60)).padStart(2, "0");
      const ss = String(secElapsed % 60).padStart(2, "0");
      recordHint.textContent = `錄音中…再點一次停止  ${mm}:${ss}`;
    }

    function setRecordingUI() {
      recordBtn.classList.add("record-btn--recording");
      recordBtn.setAttribute("aria-label", "停止錄音");
      recordHint.classList.add("record-hint--recording");
      secElapsed = 0;
      updateCountdownText();
      countdownTimer = setInterval(() => {
        secElapsed += 1;
        updateCountdownText();
      }, 1000);
      autoStopTimer = setTimeout(() => {
        showToast("⏱ 已達 60 秒上限、自動停止", 2800);
        stopRecording();
      }, RECORD_LIMIT_SEC * 1000);
    }

    function setIdleUI() {
      recordBtn.classList.remove("record-btn--recording");
      recordBtn.setAttribute("aria-label", "開始錄音");
      recordHint.classList.remove("record-hint--recording");
      // 子步 3b 改:有 recordedBlob 時引導往下看試聽區、否則回初始文字
      recordHint.textContent = recordedBlob ? "錄好了、看下面試聽 / 重錄 / 上傳" : "點麥克風開始錄音";
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      if (autoStopTimer)  { clearTimeout(autoStopTimer);   autoStopTimer  = null; }
      secElapsed = 0;
    }

    async function startRecording() {
      // Q4 拍板:按麥克風前先提示、避免使用者被瀏覽器權限對話框嚇到
      showToast("💡 等等手機會問要不要用麥克風、請按「允許」");
      // 等 toast 顯示一下再請求權限(避免被 OS 對話框立刻蓋掉)
      await new Promise(r => setTimeout(r, 500));

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error("getUserMedia 失敗:", err);
        showToast("⚠ 麥克風被擋住了、到瀏覽器設定允許", 3500);
        return;
      }

      const picked = pickMimeType();
      if (!picked) {
        showToast("⚠ 這台裝置不支援錄音、請換瀏覽器試試", 3500);
        stream.getTracks().forEach(t => t.stop());
        return;
      }

      recordedChunks = [];
      recordedBlob   = null;
      recordedExt    = picked.ext;

      mediaRecorder = new MediaRecorder(stream, { mimeType: picked.mime });
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop()); // 釋放麥克風
        recordedBlob = new Blob(recordedChunks, { type: picked.mime });
        setIdleUI();
        showPlayback(); // 子步 3b:跳出試聽區、上傳按鈕仍 disabled、子步 3c 才接上傳
      };

      mediaRecorder.start();
      setRecordingUI();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    recordBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        stopRecording();
      } else {
        startRecording();
      }
    });

    /* ============================================================
       子步 3b:試聽 / 重錄 控制(上傳按鈕 disabled、子步 3c 才接邏輯)
       ============================================================ */

    const playbackSection = document.getElementById("playbackSection");
    const playbackAudio   = document.getElementById("playbackAudio");
    const playBtn         = document.getElementById("playBtn");
    const resetBtn        = document.getElementById("resetBtn");
    const playbackHint    = document.getElementById("playbackHint");

    let playbackUrl = null;

    function showPlayback() {
      if (!recordedBlob) return;
      if (playbackUrl) URL.revokeObjectURL(playbackUrl);
      playbackUrl = URL.createObjectURL(recordedBlob);
      playbackAudio.src = playbackUrl;
      playBtn.textContent = "▶ 試聽";
      playbackSection.hidden = false;
      const kb = Math.round(recordedBlob.size / 1024);
      playbackHint.textContent = `錄好 ${kb} KB、上傳功能子步 3c 接`;
    }

    function hidePlayback() {
      playbackSection.hidden = true;
      playbackAudio.pause();
      playbackAudio.removeAttribute("src");
      playbackAudio.load();
      if (playbackUrl) { URL.revokeObjectURL(playbackUrl); playbackUrl = null; }
      playBtn.textContent = "▶ 試聽";
      recordedBlob   = null;
      recordedChunks = [];
      setIdleUI(); // hint 切回「點麥克風開始錄音」
    }

    playBtn.addEventListener("click", () => {
      if (playbackAudio.paused) {
        playbackAudio.play();
        playBtn.textContent = "⏸ 暫停";
      } else {
        playbackAudio.pause();
        playBtn.textContent = "▶ 試聽";
      }
    });

    playbackAudio.addEventListener("ended", () => {
      playBtn.textContent = "▶ 試聽";
    });

    resetBtn.addEventListener("click", () => {
      hidePlayback();
    });

    /* ============================================================
       子步 3c:上傳 Apps Script + Firestore 雙寫(recordings + recordCount)
       拍板對應:N1 likes/comments 寫新格式 array、N2 成功才本地 +1、F3 base64>5MB warn
       ============================================================ */

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = reader.result; // 形式:data:audio/webm;base64,XXXX
          const comma = result.indexOf(",");
          resolve(comma >= 0 ? result.substring(comma + 1) : result);
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    async function handleUpload() {
      if (!recordedBlob || !memberId) {
        showToast("⚠ 沒錄音可上傳", 2200);
        return;
      }

      // 三鈕同時 disabled 防多按
      uploadBtn.disabled = true;
      playBtn.disabled   = true;
      resetBtn.disabled  = true;
      const originalUploadText = uploadBtn.textContent;
      uploadBtn.textContent = "☁ 上傳中…";

      try {
        showProgressToast("encode", 15);  // 子步 3c.3:四段進度 1/4
        const base64 = await blobToBase64(recordedBlob);

        // F3:base64 > 5MB 就 warn(Apps Script POST 上限約 6MB、避免超標靜默失敗)
        if (base64.length > 5 * 1024 * 1024) {
          console.warn(`⚠ base64 size ${(base64.length / 1024 / 1024).toFixed(2)}MB > 5MB、接近 Apps Script POST 上限`);
        }

        const filename = `${memberId}.${recordedExt}`;

        // POST blind:Apps Script web app POST 跨域 redirect 到 googleusercontent.com、
        // 瀏覽器擋 redirect 後的 response body、resp.json() 拿到的 data.fileId 是 undefined。
        // 已實測泰雅語 App 同套 workaround:不解析 response、信任 Drive 端寫入、由下面 GET list 撈 fileId。
        showProgressToast("post", 55);  // 子步 3c.3:四段進度 2/4
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ audio: base64, filename })
        });

        // GET ?action=list 撈剛寫入的 fileId(GET 跨域 redirect 行為 CORS 友善、能拿 response body)
        showProgressToast("get", 85);  // 子步 3c.3:四段進度 3/4
        const listResp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
        const listData = await listResp.json();
        const myFiles = listData[memberId] || [];

        // edge case B:撈不到 memberId 下任何檔 → POST 可能真的失敗、走 catch 讓用戶重試
        if (myFiles.length === 0) {
          throw new Error("Apps Script list 撈不到 memberId 的檔案、POST 可能失敗");
        }

        // 取最新:filename desc(時間戳 _MMDDHHMM 大=新)、
        // edge case A:同時間戳 tiebreak 用 fileId desc(Drive 唯一 ID、永遠 deterministic)
        myFiles.sort((a, b) => {
          const fnCmp = (b.filename || "").localeCompare(a.filename || "");
          if (fnCmp !== 0) return fnCmp;
          return (b.fileId || "").localeCompare(a.fileId || "");
        });
        const latest = myFiles[0];

        // edge case B':防 Apps Script list schema 變更導致欄位缺失
        if (!latest.fileId || !latest.filename) {
          throw new Error("Apps Script list 回的 latest 缺 fileId 或 filename");
        }

        // 寫 Firestore recordings(N1 拍板:likes/comments 直接寫新格式 array)
        // 已知限制 R1:同一 member 兩支裝置同分鐘錄會 race、87 人家族短期不會發生、6/15 後再處理
        showProgressToast("firestore", 95);  // 子步 3c.3:四段進度 4/4
        await addDoc(collection(db, "recordings"), {
          memberId,
          fileId: latest.fileId,
          filename: latest.filename,
          mimeType: recordedBlob.type,
          createdAt: serverTimestamp(),
          likes: [],     // Task 3 拍板:array of deviceId(代替原 spec 預留的 number)
          comments: []   // Task 3 拍板:array of {deviceId, memberId, text, createdAt}
        });

        // 雙寫 recordCount(Q5 拍板)
        await updateDoc(doc(db, "members", memberId), {
          recordCount: increment(1)
        });

        // N2 拍板:本地 +1 只在「上傳成功的 callback 裡」做、失敗 UI 不變
        localRecordCount += 1;
        document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;

        showProgressToast("success", 100);  // 子步 3c.3:100% + 1.5 秒自動淡出
        hidePlayback(); // 試聽區消失、回 idle
        // 子步 3a F_R2 拍板:不再 call loadRecordings、靠 onSnapshot 推送新文件(避免雙 fetch race)

      } catch (err) {
        console.error("上傳失敗:", err);
        showProgressToast("error", null);  // 子步 3c.3:percent=null 停在當前寬度、變紅、1.5 秒淡出
        // 失敗:UI 不變、保留試聽區、用戶可再按 ☁ 重試 或 ↻ 重錄
      } finally {
        uploadBtn.disabled = false;
        playBtn.disabled   = false;
        resetBtn.disabled  = false;
        uploadBtn.textContent = originalUploadText;
      }
    }

    uploadBtn.addEventListener("click", handleUpload);

    /* ============================================================
       子步 4a:過去錄音清單 fetch + render + Hero N 改用清單長度
       Q5 拍板:個人頁 N 用清單長度為真(recordCount 仍雙寫但首頁卡片才讀)
       ============================================================ */

    const recordingsList = document.getElementById("recordingsList");
    let allRecordings = []; // 子步 4b 播放時要用 filename 推 mimeType

    function parseFilenameToDate(filename) {
      // 格式:{memberId}_MMDDHHMM.ext → MM/DD HH:MM
      const m = (filename || "").match(/_(\d{2})(\d{2})(\d{2})(\d{2})\./);
      if (!m) return "";
      const [, mm, dd, hh, min] = m;
      return `${mm}/${dd} ${hh}:${min}`;
    }

    async function loadRecordings() {
      try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
        const data = await resp.json();
        const items = data[memberId] || [];
        // 排序同子步 3c.2:filename desc(時間戳大=新)、tiebreak fileId desc
        items.sort((a, b) => {
          const fnCmp = (b.filename || "").localeCompare(a.filename || "");
          if (fnCmp !== 0) return fnCmp;
          return (b.fileId || "").localeCompare(a.fileId || "");
        });
        allRecordings = items;
        renderRecordings(items);
        // Q5 拍板:Hero N 改用清單長度為真、覆蓋 renderHero 寫的 recordCount
        localRecordCount = items.length;
        document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
      } catch (err) {
        console.error("loadRecordings 失敗:", err);
        recordingsList.innerHTML = `<div class="recordings-empty">⚠ 載入失敗、請重新整理</div>`;
      }
    }

    function renderRecordings(items) {
      if (items.length === 0) {
        recordingsList.innerHTML = `<div class="recordings-empty">還沒有錄音、按上面麥克風錄第一段吧</div>`;
        return;
      }
      recordingsList.innerHTML = "";
      const total = items.length;
      const myDeviceId = getDeviceId();
      items.forEach((item, idx) => {
        const ordinal = total - idx; // 最上面 = 第 N 段(最新)、最下面 = 第 1 段
        const likes = item.likes || [];
        const liked = likes.includes(myDeviceId);
        const row = document.createElement("div");
        row.className = "recording-row";
        row.dataset.fileId = item.fileId; // 子步 3a onSnapshot 用、partial update 不重 render 整 row
        row.innerHTML = `
          <div class="recording-row__top">
            <div class="recording-row__icon">🎵</div>
            <div class="recording-row__text">
              <div class="recording-row__date">${parseFilenameToDate(item.filename)}</div>
              <div class="recording-row__index">第 ${ordinal} 段錄音</div>
            </div>
            <button class="recording-row__play" aria-label="播放第 ${ordinal} 段">▶</button>
          </div>
          <div class="recording-row__bottom">
            <button class="recording-row__action recording-row__like ${liked ? 'recording-row__like--liked' : ''}" aria-label="按讚第 ${ordinal} 段">
              <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C.5 8 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4 4.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>
              <span class="recording-row__like-count">${likes.length}</span>
            </button>
          </div>
        `;
        row.querySelector(".recording-row__play").addEventListener("click", (e) => {
          playRecording(item.fileId, item.filename, e.currentTarget);
        });
        row.querySelector(".recording-row__like").addEventListener("click", (e) => {
          handleLikeToggle(item.fileId, e.currentTarget);
        });
        recordingsList.appendChild(row);
      });
    }

    /* ============================================================
       子步 4b:點播放 / 暫停 / 切換
       拍板對應:M1 獨立 audio element、M2 載入中 disabled + 5 秒慢 toast、M3 mimeType 從 filename 後綴
       F1 實測:?id=fileId 回純 base64 string(無 JSON 包裝、無 dataURL prefix)
       ============================================================ */

    const recordingsAudio = document.getElementById("recordingsAudio");
    let currentPlayingBtn = null;
    let currentPlayingFileId = null;
    let playLoadingTimer = null;

    function pickMimeFromFilename(filename) {
      // M3 拍板:filename 後綴判斷、fallback audio/webm
      if ((filename || "").endsWith(".mp4")) return "audio/mp4";
      return "audio/webm";
    }

    function setPlayBtnState(btn, state) {
      btn.classList.remove("recording-row__play--loading", "recording-row__play--playing");
      if (state === "loading") {
        btn.classList.add("recording-row__play--loading");
        btn.textContent = "⌛";
        btn.disabled = true;
      } else if (state === "playing") {
        btn.classList.add("recording-row__play--playing");
        btn.textContent = "⏸";
        btn.disabled = false;
      } else {
        btn.textContent = "▶";
        btn.disabled = false;
      }
    }

    async function playRecording(fileId, filename, btn) {
      // 點同一筆且正在播 → 暫停
      if (currentPlayingFileId === fileId && !recordingsAudio.paused) {
        recordingsAudio.pause();
        setPlayBtnState(btn, "idle");
        currentPlayingBtn = null;
        currentPlayingFileId = null;
        return;
      }

      // 點別筆 → 把當前播放的停掉、按鈕回 idle
      if (currentPlayingBtn && currentPlayingBtn !== btn) {
        setPlayBtnState(currentPlayingBtn, "idle");
        recordingsAudio.pause();
        recordingsAudio.removeAttribute("src");
        recordingsAudio.load();
      }

      // 進 loading
      setPlayBtnState(btn, "loading");
      currentPlayingBtn = btn;
      currentPlayingFileId = fileId;

      // M2 加分:5 秒還在 loading → toast「網路有點慢」(避免長輩雙重點擊)
      if (playLoadingTimer) clearTimeout(playLoadingTimer);
      playLoadingTimer = setTimeout(() => {
        if (currentPlayingFileId === fileId && btn.classList.contains("recording-row__play--loading")) {
          showToast("網路有點慢、再等一下…", 2500);
        }
      }, 5000);

      try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?id=${encodeURIComponent(fileId)}`);
        const base64 = await resp.text();
        if (playLoadingTimer) { clearTimeout(playLoadingTimer); playLoadingTimer = null; }

        // 載入期間用戶點別筆 / 暫停了 → 不繼續播
        if (currentPlayingFileId !== fileId) return;

        const mime = pickMimeFromFilename(filename);
        recordingsAudio.src = `data:${mime};base64,${base64}`;
        await recordingsAudio.play();
        setPlayBtnState(btn, "playing");
      } catch (err) {
        console.error("playRecording 失敗:", err);
        showToast("⚠ 播放失敗、請重試", 2800);
        setPlayBtnState(btn, "idle");
        if (currentPlayingFileId === fileId) {
          currentPlayingBtn = null;
          currentPlayingFileId = null;
        }
      }
    }

    recordingsAudio.addEventListener("ended", () => {
      if (currentPlayingBtn) {
        setPlayBtnState(currentPlayingBtn, "idle");
        currentPlayingBtn = null;
        currentPlayingFileId = null;
      }
    });

    /* ============================================================
       Task 3 子步 3a:按讚 ❤️ + onSnapshot 即時同步
       拍板對應:M_R1 modal 後續做 / M_R2 query+where 篩 memberId / M_R3 雙行 row
       F_R2 拍板:loadRecordings 只初始一次、後續全靠 onSnapshot 推送
       ============================================================ */

    let recordingsListenerUnsub = null;

    async function handleLikeToggle(fileId, btn) {
      const myDeviceId = getDeviceId();
      const row = allRecordings.find(r => r.fileId === fileId);
      if (!row) return;

      // 找 Firestore 對應 doc(用 fileId query、子步 3c 寫入時 fileId 是 unique)
      // 走 query memberId+fileId 比較穩
      const q = query(
        collection(db, "recordings"),
        where("memberId", "==", memberId),
        where("fileId", "==", fileId)
      );

      const currentLikes = row.likes || [];
      const wasLiked = currentLikes.includes(myDeviceId);

      // 樂觀更新:UI 立刻 toggle、count 先 ±1
      const nextLikes = wasLiked
        ? currentLikes.filter(id => id !== myDeviceId)
        : [...currentLikes, myDeviceId];
      row.likes = nextLikes;
      updateRowLikes(fileId, nextLikes);

      try {
        // 撈該文件 docId(子步 3a 用 query+getDocs、Task 5 之後 onSnapshot 會 cache docId 在 row 上避免重查)
        const snap = await getDocs(q);
        if (snap.empty) throw new Error("找不到對應 recordings 文件");
        const docRef = snap.docs[0].ref;
        await updateDoc(docRef, {
          likes: wasLiked ? arrayRemove(myDeviceId) : arrayUnion(myDeviceId)
        });
        // 成功:onSnapshot 會推送 server 端確認後的 likes、UI 跟 server 同步
      } catch (err) {
        console.error("按讚失敗、rollback:", err);
        // Rollback:還原 likes 跟 UI
        row.likes = currentLikes;
        updateRowLikes(fileId, currentLikes);
        showToast("⚠ 按讚失敗、請重試", 2500);
      }
    }

    function updateRowLikes(fileId, likes) {
      // M_R2 拍板 partial DOM update、不重 render 整個 row 避免 flicker
      const rowEl = recordingsList.querySelector(`[data-file-id="${fileId}"]`);
      if (!rowEl) return;
      const myDeviceId = getDeviceId();
      const liked = (likes || []).includes(myDeviceId);
      const likeBtn = rowEl.querySelector(".recording-row__like");
      const likeCount = rowEl.querySelector(".recording-row__like-count");
      if (likeBtn) likeBtn.classList.toggle("recording-row__like--liked", liked);
      if (likeCount) likeCount.textContent = (likes || []).length;
    }

    function setupRecordingsListener() {
      // 拆掉舊 listener(切換 member 才會發生、目前不會、防呆)
      if (recordingsListenerUnsub) { recordingsListenerUnsub(); recordingsListenerUnsub = null; }
      const q = query(
        collection(db, "recordings"),
        where("memberId", "==", memberId)
      );
      recordingsListenerUnsub = onSnapshot(q, (snap) => {
        let listChanged = false;
        snap.docChanges().forEach((change) => {
          const data = change.doc.data();
          const fileId = data.fileId;
          if (!fileId) return;
          if (change.type === "added") {
            // 新文件:檢查 allRecordings 有沒有(初始 loadRecordings 撈過會有、新上傳的不會)
            let row = allRecordings.find(r => r.fileId === fileId);
            if (!row) {
              allRecordings.push({
                fileId,
                filename: data.filename || "",
                likes: data.likes || [],
                comments: data.comments || []
              });
              listChanged = true;
            } else {
              // 既有 row、合 likes / comments 進來
              row.likes = data.likes || [];
              row.comments = data.comments || [];
              updateRowLikes(fileId, row.likes);
            }
          } else if (change.type === "modified") {
            const row = allRecordings.find(r => r.fileId === fileId);
            if (row) {
              row.likes = data.likes || [];
              row.comments = data.comments || [];
              updateRowLikes(fileId, row.likes);
            }
          } else if (change.type === "removed") {
            // 6/15 前不會發生(沒刪除功能)、先不處理
          }
        });
        if (listChanged) {
          // 新文件加入、重新排序 + render(子步 3a 不接 comments、子步 3c 補)
          allRecordings.sort((a, b) => {
            const fnCmp = (b.filename || "").localeCompare(a.filename || "");
            if (fnCmp !== 0) return fnCmp;
            return (b.fileId || "").localeCompare(a.fileId || "");
          });
          renderRecordings(allRecordings);
          localRecordCount = allRecordings.length;
          document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
        }
      }, (err) => {
        console.error("onSnapshot 失敗:", err);
      });
    }

    main();
  </script>

</body>
</html>
