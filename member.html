<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <!-- a7 四輪:Step 2a 調試期硬性破快取(只 member.html、index.html 不動避免影響首頁效能) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#ffffff" />
  <title>個人頁面 · Istanda Takiscipanan</title>
  <script>
    /* 6-4 介面大小:最早期讀 localStorage 套字級(避免閃);倍率值在 style.css :root */
    (function(){ try { var s = localStorage.getItem('istanda_font_scale');
      if (s === 'large' || s === 'xlarge') document.documentElement.setAttribute('data-font-scale', s);
    } catch(e){} })();
  </script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="style.css?v=18" />

  <!-- PWA(Task 6):路徑全相對 ./ -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Istanda" />
  <style>
    /* ============================================================
       MEMBER PAGE · Hero / 錄音區 placeholder / 清單 placeholder
       全部走 :root 的 CSS 變數,漸層只用「限動五色」+「強調動作」兩條
       ============================================================ */

    /* ===== 「← 回首頁」icon button (對齊 .icon-btn 風格) ===== */
    .back-btn {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%;
      color: var(--text);
      transition: background 0.15s, transform 0.15s;
    }
    .back-btn:hover { background: var(--bg-soft); }
    .back-btn:active { transform: scale(0.92); }
    .back-btn svg { width: 24px; height: 24px; }

    .app-header__title-mid {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .app-header__spacer { width: 40px; flex-shrink: 0; }

    /* ===== Hero 區(v2 翻盤:純白、靠 ring 五色當主視覺、米色細邊分隔下方錄音區)===== */
    .member-hero {
      background: var(--bg-elevated);
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 16px 20px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    /* 限動五色漸層 ring,沿用 .story__ring 邏輯但放大到 hero 等級 */
    .member-hero__ring {
      width: 82px; height: 82px;
      border-radius: 50%;
      padding: 3px;
      background: var(--bunun-red);
      flex-shrink: 0;
    }
    .member-hero__ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, #4a4a4a, #6b6b6b);
    }
    .member-hero__avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4a4a4a, #6b6b6b);
      letter-spacing: 0.02em;
    }

    .member-hero__text { flex: 1; min-width: 0; }
    .member-hero__name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .member-hero__nick {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .member-hero__count {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* ===== 錄音區（子步 3a:狀態機 + 60 秒自動停 + 權限 UX、不上傳）===== */
    .record-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 32px 16px 24px;
      text-align: center;
    }
    .section-title {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }
    .record-btn {
      width: 100px; height: 100px;
      margin: 0 auto;
      border-radius: 50%;
      background: var(--bunun-red);
      display: flex; align-items: center; justify-content: center;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s;
    }
    .record-btn:active { transform: scale(0.94); }
    .record-btn svg {
      width: 40px; height: 40px;
      color: #fff;
    }
    /* 錄音中:spec line 118 拍板紅 #d04848 + pulse 動畫 */
    .record-btn--recording {
      background: #d04848;
      animation: record-pulse 1.4s ease-in-out infinite;
    }
    @keyframes record-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(208, 72, 72, 0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(208, 72, 72, 0); }
    }
    .record-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .record-hint--recording { color: #d04848; }

    /* ===== 試聽區（子步 3b:三按鈕橫排、預設 hidden、錄完才出現）===== */
    .playback-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 16px 24px;
      text-align: center;
    }
    .playback-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      max-width: 360px;
      margin: 0 auto;
    }
    .playback-btn {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .playback-btn:active { transform: scale(0.96); }
    .playback-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .playback-btn:disabled:active { transform: none; }
    /* 試聽（spec line 126:bg-elevated + text）*/
    .playback-btn--play {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    /* 重錄（spec line 127:透明 + border）*/
    .playback-btn--reset {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    /* 上傳（spec line 128:強調動作漸層 + 白字、子步 3c 才接邏輯、現在 disabled）*/
    .playback-btn--upload {
      background: var(--bunun-red);
      color: #fff;
      border: none;
    }
    .playback-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== 上傳進度橫條(子步 3c.3:四段式視覺回饋、取代單行 toast)===== */
    .progress-toast {
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 320px;
      background: rgba(26, 26, 26, 0.92);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease-out;
      z-index: 1100;
    }
    .progress-toast--show { opacity: 1; }
    .progress-toast__row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      gap: 12px;
    }
    .progress-toast__label {
      color: #f4f1ea;
      font-size: 14px;
      font-weight: 500;
    }
    .progress-toast__hint {
      color: rgba(244, 241, 234, 0.6);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .progress-toast__track {
      height: 4px;
      background: rgba(244, 241, 234, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-toast__fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f58529, #dd2a7b);
      border-radius: 2px;
      transition: width 0.4s ease-out, background 0.25s ease-out;
    }
    .progress-toast__fill--error { background: var(--like-red); }

    /* ===== 過去錄音清單(子步 4a:fetch + render + Hero N 改用清單長度)===== */
    .recordings-section {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .recordings-empty {
      text-align: center;
      padding: 24px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    /* 子步 3a:雙行 row(M_R3 B 拍板 IG / FB 風格)*/
    .recording-row {
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .recording-row:last-child { border-bottom: none; }
    .recording-row__top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .recording-row__bottom {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      padding-left: 34px; /* 對齊上行 🎵 icon + gap */
    }
    /* 子步 3a:❤️ / 💬 互動鈕、整個 button 都是 tap 區(M_R3 加分) */
    .recording-row__action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      background: transparent;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .recording-row__action:hover { background: var(--bg-soft); }
    .recording-row__action:active { transform: scale(0.96); }
    .recording-row__action svg {
      width: 18px; height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linejoin: round;
    }
    /* ❤️ 按讚:idle 灰外框、liked 紅實心(IG 經典 var(--like-red))*/
    .recording-row__like--liked {
      color: var(--like-red);
    }
    .recording-row__like--liked svg {
      fill: var(--like-red);
      stroke: var(--like-red);
    }

    /* ===== 子步 3b:留言 Bottom Sheet(Q3 拍板:下滑、70% 高、標題 + 列表 + 輸入框)===== */
    .comment-sheet {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .comment-sheet__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }
    .comment-sheet__panel {
      position: relative;
      width: 100%;
      max-width: var(--max-w);
      height: 70vh;
      max-height: 70vh;
      background: var(--bg-elevated);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      animation: comment-sheet-slide 0.25s ease-out;
    }
    @keyframes comment-sheet-slide {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .comment-sheet__header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .comment-sheet__title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .comment-sheet__close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .comment-sheet__close:hover { background: var(--bg-soft); }
    .comment-sheet__list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .comment-sheet__empty {
      text-align: center;
      padding: 32px 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .comment-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment-row:last-child { border-bottom: none; }
    .comment-row__author {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .comment-row__text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .comment-row__time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .comment-sheet__input-row {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
      align-items: flex-end;
    }
    .comment-sheet__input {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px 14px;
      resize: none;
      outline: none;
      max-height: 96px;
      line-height: 1.4;
    }
    .comment-sheet__input:focus { border-color: var(--text-muted); }
    .comment-sheet__submit {
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--bg-elevated);
      background: var(--text);
      border: none;
      border-radius: 18px;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .comment-sheet__submit:active { transform: scale(0.96); }
    .comment-sheet__submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Task 3 收尾:留言時切換身份(「不是我?」入口) */
    .comment-sheet__identity {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 0;
    }
    .comment-sheet__identity-pill {
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .comment-sheet__identity-pill:hover { background: var(--border); }
    .comment-sheet__identity-suffix { color: var(--text-muted); }
    .comment-sheet__identity-switch {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      padding: 2px 4px;
    }
    .comment-sheet__identity-switch:hover { color: var(--text); }

    /* fix:留言 Sheet 開著時(z-index 1200)、「我是誰」modal 要蓋過 Sheet。
       style.css 內 .identity-modal z-index: 100 對首頁夠、member.html 需 override */
    .identity-modal { z-index: 1300; }
    .recording-row__icon {
      font-size: 22px;
      flex-shrink: 0;
      line-height: 1;
    }
    .recording-row__text {
      flex: 1;
      min-width: 0;
    }
    .recording-row__date {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .recording-row__index {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    /* 黑色圓形播放鈕(spec line 158)、子步 4b 三態:idle ▶ / loading ⌛ / playing ⏸ */
    .recording-row__play {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      font-size: 13px;
      line-height: 1;
      transition: transform 0.15s, background 0.25s;
    }
    .recording-row__play:active { transform: scale(0.92); }
    .recording-row__play:disabled { cursor: wait; }
    .recording-row__play:disabled:active { transform: none; }
    /* loading:米灰底 + ⌛ */
    .recording-row__play--loading {
      background: var(--text-muted);
    }
    /* playing:強調漸層 + ⏸(spec line 159)*/
    .recording-row__play--playing {
      background: var(--bunun-red);
    }

    /* ===== Task 4 Step 3:deep link 落點高亮(薑黃 --accent 邊框閃 2 秒、淡出)===== */
    .recording-row--highlighted {
      animation: highlight-pulse 2s ease-out;
    }
    @keyframes highlight-pulse {
      0%   { box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--accent); background: rgba(212, 160, 23, 0.08); }
      50%  { box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--accent); background: rgba(212, 160, 23, 0.08); }
      100% { box-shadow: 0 0 0 0 transparent, 0 0 0 transparent; background: transparent; }
    }

    /* ===== 友善錯誤畫面 ===== */
    .error-screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      background: var(--bg);
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }
    .error-screen__icon { font-size: 48px; line-height: 1; opacity: 0.6; }
    .error-screen__title {
      font-size: 18px; font-weight: 600;
      color: var(--text);
    }
    .error-screen__msg {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }
    .error-screen__home {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 22px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .error-screen__home:active { transform: scale(0.96); }

    /* ===== Task 4:分享 Bottom Sheet(.share-sheet__* 新 namespace、S0-3:
       不複用 .comment-sheet__*、複製 slide-up + backdrop pattern、高度 280px)===== */
    .share-sheet__backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1200;
      display: none;
    }
    .share-sheet__panel {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-w);
      height: 280px;          /* 內容少、不用 70vh */
      background: var(--bg-elevated);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.15);
      z-index: 1201;
      display: none;
      flex-direction: column;
      animation: share-sheet-slide 0.25s ease-out;   /* 不複用 comment-sheet-slide */
    }
    @keyframes share-sheet-slide {
      from { transform: translate(-50%, 100%); }
      to   { transform: translate(-50%, 0); }
    }
    .share-sheet__header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .share-sheet__title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .share-sheet__close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .share-sheet__close:hover { background: var(--bg-soft); }
    .share-sheet__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 16px;
    }
    .share-sheet__btn {
      height: 48px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, background 0.15s;
    }
    .share-sheet__btn:active { transform: scale(0.97); }
    /* 開啟 LINE:主要動作、沿用上傳鈕的強調漸層語彙(此 file 既有 pattern、非新寫死色)*/
    .share-sheet__btn--line {
      background: var(--bunun-red);
      color: #fff;
      border: none;
    }
    /* 複製訊息:次要、白底 + 米邊 */
    .share-sheet__btn--copy {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    /* 取消:純文字感 */
    .share-sheet__btn--cancel {
      background: transparent;
      color: var(--text-muted);
      border: none;
    }

    [hidden] { display: none !important; }

    /* ===== Task 5 Step 2b-1:發貼文入口 + 全屏 Modal(手機優先、沿用 :root token)===== */
    .post-entry {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 12px 16px 4px;
    }
    .post-entry__btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      height: 46px;
      border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500; font-family: var(--font-sans);
      color: var(--postbtn-text);
      background: var(--postbtn-bg);
      border: 1px solid var(--postbtn-border);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }
    .post-entry__btn:hover { background: #e9e6dd; }
    .post-entry__btn:active { transform: scale(0.99); }

    .post-modal {
      position: fixed;
      inset: 0;
      z-index: 1250;
      display: flex;
      justify-content: center;
    }
    .post-modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }
    .post-modal__panel {
      position: relative;
      width: 100%;
      max-width: var(--max-w);
      height: 100%;
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
      animation: post-modal-slide 0.22s ease-out;
    }
    @keyframes post-modal-slide {
      from { transform: translateY(2%); opacity: 0.6; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .post-modal__header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .post-modal__cancel {
      background: none; border: none;
      color: var(--text-soft);
      font-size: 15px; font-family: var(--font-sans);
      cursor: pointer; padding: 6px 8px;
    }
    .post-modal__title { font-size: 16px; font-weight: 600; color: var(--text); }
    .post-modal__close {
      width: 32px; height: 32px; border-radius: 50%;
      background: transparent; border: none;
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .post-modal__close:hover { background: var(--bg-soft); }
    .post-modal__body {
      flex: 1; overflow-y: auto;
      padding: 10px 16px 16px;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* 照片區 */
    .post-photos__empty {
      width: 100%;
      min-height: 180px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      background: var(--photo-box-bg);
      border: 1.5px solid var(--photo-box-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .post-photos__empty:hover { background: #f3ead6; }
    .post-photos__empty-icon { font-size: 52px; color: var(--photo-box-plus); line-height: 1; }
    .post-photos__empty-text { font-size: 15px; font-weight: 500; color: var(--text-soft); }
    .post-photos__empty-hint { font-size: 12px; color: var(--text-muted); }
    .post-photos__strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    /* 已選縮圖(2b-2 起 render、先放樣式)*/
    .post-photo-thumb {
      position: relative; flex-shrink: 0;
      width: 84px; height: 84px;
      border-radius: var(--radius-sm);
      overflow: hidden; border: 1px solid var(--border);
    }
    .post-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .post-photo-thumb__del {
      position: absolute; top: 3px; right: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.6); color: #fff;
      border: none; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    /* 末尾「＋ 加更多」tile(<9 張時顯示)*/
    .post-photo-thumb--add {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-soft); border: 2px dashed var(--border);
      color: var(--text-muted); font-size: 28px; cursor: pointer;
    }

    /* caption */
    .post-caption__input {
      width: 100%; box-sizing: border-box;
      font-family: var(--font-sans);
      font-size: 15px; color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      resize: none; outline: none;
      line-height: 1.5; min-height: 80px;
    }
    .post-caption__input::placeholder { color: var(--caption-placeholder); }
    .post-caption__input:focus { border-color: var(--text-muted); }
    .post-caption__count {
      text-align: right; font-size: 12px; color: var(--text-muted);
      margin-top: 4px; font-variant-numeric: tabular-nums;
    }
    .post-caption__count--over { color: var(--bunun-red); }

    /* footer:分享 */
    .post-modal__footer {
      flex-shrink: 0;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .post-modal__share {
      width: 100%; height: 48px;
      border-radius: var(--radius-md);
      font-size: 16px; font-weight: 500; font-family: var(--font-sans);
      color: #fff; background: var(--publish-gradient);  /* A①:深藍漸層 */
      border: none; cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .post-modal__share:active { transform: scale(0.99); }
    .post-modal__share:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 加照片 ActionSheet(bottom sheet、複用 comment-sheet-slide 上滑動畫)*/
    .post-pick {
      position: fixed; inset: 0; z-index: 1450;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .post-pick__backdrop { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); }
    .post-pick__panel {
      position: relative; width: 100%; max-width: var(--max-w);
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      animation: comment-sheet-slide 0.22s ease-out;
    }
    .post-pick__btn {
      height: 52px; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600; font-family: var(--font-sans);
      color: var(--text); background: var(--bg-elevated);
      border: 1px solid var(--border); cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .post-pick__btn:active { transform: scale(0.98); }
    .post-pick__btn:hover { background: var(--bg-soft); }
    .post-pick__btn--cancel { color: var(--text-muted); font-weight: 700; }
    /* 雲端照片讀不到的友善退路訊息(放在 .post-pick__panel 內最上)*/
    .post-cloud__msg {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 14px; line-height: 1.6; color: var(--text-soft);
    }
    /* 2b-4c:頂部背景上傳進度條(fixed、modal 外、三狀態變色)*/
    .upload-bar {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--max-w);
      z-index: 1500;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 9px 14px;
      font-size: 13px; font-weight: 600; font-family: var(--font-sans);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
    .upload-bar--progress { background: var(--accent); }   /* 薑黃 */
    .upload-bar--done     { background: #1a9c4e; }          /* 綠 */
    .upload-bar--fail     { background: var(--bunun-red); }          /* 紅 */
    .upload-bar__close {
      background: rgba(255, 255, 255, 0.25); border: none; color: #fff;
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    /* Task 5:個人頁分頁(貼文 / 純錄音)*/
    .member-tabs {
      display: flex; gap: 4px;
      max-width: var(--max-w); margin: 8px auto 0;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
    }
    .member-tab {
      flex: 1; padding: 12px 8px;
      background: none; border: none; cursor: pointer;
      font: 600 14px/1 var(--font-sans); color: var(--text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .member-tab--active { color: var(--text); border-bottom-color: var(--text); }
  </style>
</head>
<body>

  <!-- ============ MAIN APP CONTENT ============ -->
  <div id="appContent">

    <!-- Sticky header:← / 族名 / spacer -->
    <header class="app-header">
      <div class="app-header__inner">
        <button class="back-btn" aria-label="回首頁" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <div class="app-header__title-mid" id="headerTitle">成員頁面</div>
        <div class="app-header__spacer"></div>
      </div>
      <div class="weave-ribbon" aria-hidden="true"></div>
    </header>

    <main class="app-main">

      <!-- Hero -->
      <section class="member-hero">
        <div class="member-hero__ring">
          <div class="member-hero__ring-inner">
            <div class="member-hero__avatar" id="heroAvatar">--</div>
          </div>
        </div>
        <div class="member-hero__text">
          <div class="member-hero__name" id="heroName">載入中…</div>
          <div class="member-hero__nick" id="heroNick"></div>
          <div class="member-hero__count" id="heroCount">0 則錄音</div>
        </div>
      </section>

      <!-- 錄音區（子步 3a:狀態機 + 60 秒自動停 + 權限 UX、不上傳）-->
      <section class="record-section">
        <div class="section-title">🎙 錄一段話</div>
        <button class="record-btn" id="recordBtn" aria-label="開始錄音">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <div class="record-hint" id="recordHint">點麥克風開始錄音</div>
      </section>

      <!-- Task 5 Step 2b-1:發貼文入口(聖瑱師審 UI 後可決定最終位置:此處 vs bottom nav)-->
      <div class="post-entry">
        <button class="post-entry__btn" id="postEntryBtn" type="button">📷 發貼文</button>
      </div>

      <!-- 試聽區（子步 3b:三按鈕橫排、預設 hidden、錄完才出現）-->
      <section class="playback-section" id="playbackSection" hidden>
        <audio id="playbackAudio" preload="auto"></audio>
        <div class="playback-row">
          <button class="playback-btn playback-btn--play"   id="playBtn"   aria-label="試聽">▶ 試聽</button>
          <button class="playback-btn playback-btn--reset"  id="resetBtn"  aria-label="重錄">↻ 重錄</button>
          <button class="playback-btn playback-btn--upload" id="uploadBtn" aria-label="上傳">☁ 上傳</button>
        </div>
        <div class="playback-hint" id="playbackHint">錄好了、確認後上傳</div>
      </section>

      <!-- Task 5:個人頁分頁(貼文 / 純錄音)、預設貼文(north-star 貼文為主)-->
      <div class="member-tabs" role="tablist">
        <button class="member-tab member-tab--active" id="tabPosts" type="button" role="tab">📷 貼文</button>
        <button class="member-tab" id="tabRecordings" type="button" role="tab">🎙 純錄音</button>
      </div>

      <!-- 貼文 pane(預設顯示;此成員 posts、卡片 member 版、照片走 ?id= 代理)-->
      <section class="posts-pane" id="postsPane">
        <div id="memberPostsList">
          <div class="recordings-empty">貼文載入中…</div>
        </div>
      </section>

      <!-- 純錄音 pane(預設隱藏;原「過去錄音」清單、邏輯一行不動、只切 hidden)-->
      <section class="recordings-section" id="recordingsPane" hidden>
        <div class="section-title">過去錄音</div>
        <audio id="recordingsAudio" preload="auto"></audio>
        <div id="recordingsList">
          <div class="recordings-empty">清單載入中…</div>
        </div>
      </section>

    </main>

    <!-- 底部 nav:錄音 tab active -->
    <nav class="bottom-nav">
      <a class="nav-btn" href="index.html" aria-label="首頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
      </a>
      <button class="nav-btn" aria-label="搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="nav-btn nav-btn--record nav-btn--active" aria-label="錄音記事">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <button class="nav-btn" aria-label="家族成員">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <button class="nav-btn" aria-label="我">
        <div class="nav-avatar">ME</div>
      </button>
    </nav>
  </div>

  <!-- ============ 友善錯誤畫面 (預設藏起來) ============ -->
  <div id="errorScreen" class="error-screen" hidden>
    <div class="error-screen__icon">🤔</div>
    <div class="error-screen__title" id="errorTitle">找不到這位成員</div>
    <div class="error-screen__msg" id="errorMsg">這個連結可能壞掉了,回首頁挑一位試試。</div>
    <a class="error-screen__home" href="index.html">← 回首頁</a>
  </div>

  <!-- ============ 全域 Toast (複用 style.css 的 .global-toast) ============ -->
  <div id="globalToast" class="global-toast"></div>

  <!-- ============ Task 5 2b-4c:頂部背景上傳進度條(fixed 頁面頂、modal 外)============ -->
  <div id="uploadBar" class="upload-bar" hidden>
    <span class="upload-bar__text" id="uploadBarText">上傳中…</span>
    <button class="upload-bar__close" id="uploadBarClose" type="button" hidden aria-label="關閉">✕</button>
  </div>

  <!-- ============ 子步 3b:留言 Bottom Sheet(預設 hidden、點 💬 開啟)============ -->
  <div id="commentSheet" class="comment-sheet" hidden>
    <div class="comment-sheet__backdrop"></div>
    <div class="comment-sheet__panel">
      <div class="comment-sheet__header">
        <div class="comment-sheet__title">留言</div>
        <button class="comment-sheet__close" aria-label="關閉">✕</button>
      </div>
      <div class="comment-sheet__list" id="commentList"></div>
      <div class="comment-sheet__identity" id="commentIdentity" hidden>
        <button class="comment-sheet__identity-pill" id="commentIdentityPill">
          <span id="commentIdentityName">家人</span><span class="comment-sheet__identity-suffix"> 留言中</span>
        </button>
        <button class="comment-sheet__identity-switch" id="commentIdentitySwitch">不是我?</button>
      </div>
      <div class="comment-sheet__input-row">
        <textarea class="comment-sheet__input" id="commentInput" placeholder="說點什麼…" rows="1"></textarea>
        <button class="comment-sheet__submit" id="commentSubmit" aria-label="送出">送出</button>
      </div>
    </div>
  </div>

  <!-- ============ Task 4:分享 Popover(Web Share API 不支援時 fallback、文字由 JS 從 MESSAGES 填)============ -->
  <div class="share-sheet__backdrop" id="shareSheetBackdrop"></div>
  <div class="share-sheet__panel" id="shareSheetPanel">
    <div class="share-sheet__header">
      <div class="share-sheet__title" id="shareSheetTitle"></div>
      <button class="share-sheet__close" id="shareSheetClose" aria-label="關閉">✕</button>
    </div>
    <div class="share-sheet__body">
      <button class="share-sheet__btn share-sheet__btn--line"   id="shareOpenLine"></button>
      <button class="share-sheet__btn share-sheet__btn--copy"   id="shareCopy"></button>
      <button class="share-sheet__btn share-sheet__btn--cancel" id="shareCancel"></button>
    </div>
  </div>

  <!-- ============ Task 5 Step 2b-1:發貼文 Modal(全屏、純 UI 殼)============
       ⚠️ 這一子步只做 UI。拍照 / 選照片 / 配音 / 分享 按鈕點了只 console.log、
       不接上傳 / 壓縮 / 錄音 / Firestore 邏輯(見 task-feed.md Step 2b)。 -->
  <div id="postModal" class="post-modal" hidden>
    <div class="post-modal__backdrop" id="postModalBackdrop"></div>
    <div class="post-modal__panel">
      <div class="post-modal__header">
        <button class="post-modal__cancel" id="postModalCancel" type="button">取消</button>
        <div class="post-modal__title">發貼文</div>
        <button class="post-modal__close" id="postModalClose" type="button" aria-label="關閉">✕</button>
      </div>

      <div class="post-modal__body">
        <!-- 1. 照片區(初始空、最多 9 張)-->
        <div class="post-photos">
          <button class="post-photos__empty" id="postAddPhotoEmpty" type="button">
            <span class="post-photos__empty-icon">＋</span>
            <span class="post-photos__empty-text">加照片</span>
            <span class="post-photos__empty-hint">最多 9 張</span>
          </button>
          <!-- 已選預覽列:2b-2 起 render 縮圖(每張右上 [×])、滿 9 張隱藏加照片入口 -->
          <div class="post-photos__strip" id="postPhotosStrip" hidden></div>
          <!-- 拍照用 hidden input(capture=現拍、永遠本機、不踩 proxy)-->
          <input type="file" accept="image/*" capture="environment" id="postCameraInput" class="visually-hidden">
          <!-- 相簿用 hidden input(multiple、可能踩 Android Photo Picker proxy、每張過守門)-->
          <input type="file" accept="image/*" multiple id="postGalleryInput" class="visually-hidden">
        </div>

        <!-- 2. caption -->
        <div class="post-caption">
          <textarea id="postCaption" class="post-caption__input" placeholder="寫點什麼…" rows="3" maxlength="500"></textarea>
          <div class="post-caption__count" id="postCaptionCount" hidden>0 / 500</div>
        </div>

        <!-- 配音佔位已拿掉(2b-2 拍板:發貼文純照片、配音回個人頁)-->
      </div>

      <!-- 4. 底部固定:分享(初始 disabled、沒照片不能分享)-->
      <div class="post-modal__footer">
        <button class="post-modal__share" id="postShareBtn" type="button" disabled>發佈</button>
      </div>
    </div>
  </div>

  <!-- 加照片 ActionSheet(二選一、純 UI、Step 2b-2 接拍照 / 2b-3 接相簿)-->
  <div id="postPickSheet" class="post-pick" hidden>
    <div class="post-pick__backdrop" id="postPickBackdrop"></div>
    <div class="post-pick__panel">
      <button class="post-pick__btn" id="postPickCamera" type="button">📷 拍照</button>
      <button class="post-pick__btn" id="postPickGallery" type="button">🖼️ 從相簿選</button>
      <button class="post-pick__btn post-pick__btn--cancel" id="postPickCancel" type="button">取消</button>
    </div>
  </div>

  <!-- 雲端照片讀不到(NotReadableError)友善退路 sheet(規則 4:不讓家人卡在白畫面)-->
  <div id="postCloudFallback" class="post-pick" hidden>
    <div class="post-pick__backdrop" id="postCloudBackdrop"></div>
    <div class="post-pick__panel">
      <div class="post-cloud__msg">
        這張照片需要從雲端載入、目前無法直接讀取。<br>
        建議改用相機拍一張(最快、最穩定);或先在「Google 相簿」打開這張照片、再回來重新選一次。
      </div>
      <button class="post-pick__btn" id="postCloudRetryCamera" type="button">📷 改用相機拍一張</button>
      <button class="post-pick__btn post-pick__btn--cancel" id="postCloudCancel" type="button">取消</button>
    </div>
  </div>

  <!-- HEIF/HEIC → JPEG 轉檔(iPhone 相簿原圖偶為 HEIF;Step 2b-2 引入、全域 heic2any)-->
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

  <!-- ============ Firebase + 應用邏輯 ============ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getFirestore, doc, getDoc, getDocs, deleteDoc,

    /* 子步 3c.3:上傳四段進度橫條(取代 handleUpload 內單行 toast、其他 showToast 用途保留)
       stage: encode/post/get/firestore/success/error

       hint: 覆蓋右側提示文字、傳 undefined 用 preset 預設 */
    let progressHideTimer = null;
    function showProgressToast(stage, percent, hint) {
      let toast = document.getElementById("progressToast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "progressToast";
        toast.className = "progress-toast";
        toast.innerHTML = `
          <div class="progress-toast__row">
            <span class="progress-toast__label"></span>
            <span class="progress-toast__hint"></span>
          </div>
          <div class="progress-toast__track">
            <div class="progress-toast__fill"></div>
          </div>`;
        document.body.appendChild(toast);
      }
      const presets = {
        encode:    { text: "☁ 編碼中...",     defaultHint: "1/3",      error: false },
        post:      { text: "☁ 上傳到雲端...", defaultHint: "2/3",      error: false },
        get:       { text: "☁ 確認中...",     defaultHint: "3/3",      error: false },
        firestore: { text: "☁ 寫入家族...",   defaultHint: "即將完成", error: false },
        success:   { text: "✅ 上傳成功!",    defaultHint: "",         error: false },
        error:     { text: "⚠ 上傳失敗、請重試", defaultHint: "",      error: true  },
      };
      const preset = presets[stage];
      if (!preset) return;

      const label  = toast.querySelector(".progress-toast__label");
      const hintEl = toast.querySelector(".progress-toast__hint");
      const fill   = toast.querySelector(".progress-toast__fill");

      label.textContent = preset.text;
      const hintText = (typeof hint === "string") ? hint : preset.defaultHint;
      hintEl.textContent = hintText;
      hintEl.style.display = hintText ? "" : "none";
      if (percent !== null && percent !== undefined) {
        fill.style.width = `${percent}%`;
      }
      fill.classList.toggle("progress-toast__fill--error", preset.error);
      toast.classList.add("progress-toast--show");

      if (progressHideTimer) { clearTimeout(progressHideTimer); progressHideTimer = null; }
      if (stage === "success" || stage === "error") {
        progressHideTimer = setTimeout(() => {
          toast.classList.remove("progress-toast--show");
          // 淡出後 reset 寬度跟錯誤態、避免下次顯示時殘留
          progressHideTimer = setTimeout(() => {
            fill.style.width = "0%";
            fill.classList.remove("progress-toast__fill--error");
          }, 300);
        }, 1500);
      }
    }

    function pickMimeType() {
      if (typeof MediaRecorder === "undefined") return null;
      if (MediaRecorder.isTypeSupported("audio/webm")) return { mime: "audio/webm", ext: "webm" };

    function updateCountdownText() {

    async function startRecording() {
      // Q4 拍板:按麥克風前先提示、避免使用者被瀏覽器權限對話框嚇到
      showToast("💡 等等手機會問要不要用麥克風、請按「允許」");
      // 等 toast 顯示一下再請求權限(避免被 OS 對話框立刻蓋掉)
      await new Promise(r => setTimeout(r, 500));

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error("getUserMedia 失敗:", err);
        showToast("⚠ 麥克風被擋住了、到瀏覽器設定允許", 3500);
        return;
      }

      const picked = pickMimeType();
      if (!picked) {
        showToast("⚠ 這台裝置不支援錄音、請換瀏覽器試試", 3500);
        stream.getTracks().forEach(t => t.stop());
        return;
      }

      recordedChunks = [];
      recordedBlob   = null;
      recordedExt    = picked.ext;

      mediaRecorder = new MediaRecorder(stream, { mimeType: picked.mime });
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop()); // 釋放麥克風
        recordedBlob = new Blob(recordedChunks, { type: picked.mime });
        setIdleUI();
        showPlayback(); // 子步 3b:跳出試聽區、上傳按鈕仍 disabled、子步 3c 才接上傳
      };

      mediaRecorder.start();
      setRecordingUI();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    recordBtn.addEventListener("click", () => {

    /* ============================================================

    const playbackSection = document.getElementById("playbackSection");

    /* ============================================================
       子步 3c:上傳 Apps Script + Firestore 雙寫(recordings + recordCount)
       拍板對應:N1 likes/comments 寫新格式 array、N2 成功才本地 +1、F3 base64>5MB warn
       ============================================================ */

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = reader.result; // 形式:data:audio/webm;base64,XXXX
          const comma = result.indexOf(",");
          resolve(comma >= 0 ? result.substring(comma + 1) : result);
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    // 排序:filename desc(時間戳 _MMDDHHMM 大=新)、tiebreak fileId desc(Drive 唯一 ID、deterministic)
    // 共用於 loadRecordings 初始排序 + handleUpload 回填取最新(規則 2:不重寫)
    function sortByNewest(items) {
      items.sort((a, b) => {
        const fnCmp = (b.filename || "").localeCompare(a.filename || "");
        if (fnCmp !== 0) return fnCmp;
        return (b.fileId || "").localeCompare(a.fileId || "");
      });
      return items;
    }

    async function handleUpload() {
      if (!recordedBlob || !memberId) {
        showToast("⚠ 沒錄音可上傳", 2200);
        return;
      }

      // 三鈕同時 disabled 防多按
      uploadBtn.disabled = true;
      playBtn.disabled   = true;
      resetBtn.disabled  = true;
      const originalUploadText = uploadBtn.textContent;
      uploadBtn.textContent = "☁ 上傳中…";

      try {
        showProgressToast("encode", 15);  // 子步 3c.3:四段進度 1/4
        const base64 = await blobToBase64(recordedBlob);

        // F3:base64 > 5MB 就 warn(Apps Script POST 上限約 6MB、避免超標靜默失敗)
        if (base64.length > 5 * 1024 * 1024) {
          console.warn(`⚠ base64 size ${(base64.length / 1024 / 1024).toFixed(2)}MB > 5MB、接近 Apps Script POST 上限`);
        }

        const filename = `${memberId}.${recordedExt}`;
        // Task 5 Step 1:已知子資料夾就帶 folderId(走快速主路徑)、首次上傳為空(走保底)
        const knownFolderId = (memberData && memberData.driveFolderId) ? memberData.driveFolderId : "";

        // 排序 fix(2026-06-03):POST 直傳、直接讀回應 { ok, fileId, filename, folderId, mimeType }(.gs doPost)。
        // 寫 Firestore 的 filename / fileId 一律用「後端實際回傳那個」= 權威值。
        // 不再重撈 Drive list 取 sortByNewest()[0] 來「猜最新」:那會 race —— 剛上傳的檔 Drive 還沒索引到時、
        // 會抓到上一筆舊檔名寫進新文件、害排序錯位(本次 bug 真因)。
        // POST 為無自訂 header 的 simple request(body 預設 text/plain)、回應跨域可讀,
        // 與線上已運作的 GET ?id= / ?action=list 同一套 redirect 機制。
        showProgressToast("post", 55);  // 子步 3c.3:四段進度 2/4
        const postResp = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            audio: base64,
            filename,
            memberId,
            memberName: (memberData && memberData.name) || "",
            folderId: knownFolderId
          })
        });

        showProgressToast("get", 85);  // 子步 3c.3:四段進度 3/4
        let latest = null;
        let backfillFolderId = null;
        try {
          const result = await postResp.json();
          if (result && result.ok && result.fileId && result.filename) {
            latest = { fileId: result.fileId, filename: result.filename };
            // 首次上傳:後端回的 folderId 就是剛建/找到的成員子夾、回填 members.driveFolderId
            if (!knownFolderId) backfillFolderId = result.folderId || null;
          }
        } catch (e) {
          // 極少數瀏覽器(歷史上疑似 iOS Safari)擋跨域 redirect body → 下方走保底重撈
          console.warn("[upload] POST 回應讀不到、改走 ?action=list 保底:", (e && e.message) || e);
        }

        // 保底:只有 POST 回應拿不到 fileId/filename 時才重撈 Drive list(舊 Task 5 路徑、有 race 但不漏件)
        if (!latest) {
          if (knownFolderId) {
            const resp = await fetch(`${APPS_SCRIPT_URL}?action=list&folderId=${encodeURIComponent(knownFolderId)}`);
            const data = await resp.json();
            const files = (data && data.files) || [];
            if (files.length === 0) throw new Error("POST 回應讀不到、保底 list(folderId) 也撈不到檔案");
            latest = sortByNewest(files)[0];
          } else {
            const resp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
            const data = await resp.json();
            const files = (data.result && data.result[memberId]) || [];
            if (files.length === 0) throw new Error("POST 回應讀不到、保底 list 也撈不到 memberId 的檔案");
            latest = sortByNewest(files)[0];
            backfillFolderId = latest.parentFolderId || null;
          }
        }

        // edge case B':防欄位缺失
        if (!latest.fileId || !latest.filename) {
          throw new Error("拿不到 fileId 或 filename(POST 回應與保底 list 都失敗)");
        }

        // 寫 Firestore recordings(N1 拍板:likes/comments 直接寫新格式 array)
        // 已知限制 R1:同一 member 兩支裝置同分鐘錄會 race、87 人家族短期不會發生、6/15 後再處理
        showProgressToast("firestore", 95);  // 子步 3c.3:四段進度 4/4
        await addDoc(collection(db, "recordings"), {
          memberId,
          fileId: latest.fileId,
          filename: latest.filename,
          mimeType: recordedBlob.type,
          createdAt: serverTimestamp(),
          likes: [],     // Task 3 拍板:array of deviceId(代替原 spec 預留的 number)
          comments: []   // Task 3 拍板:array of {deviceId, memberId, text, createdAt}
        });

        // 雙寫 recordCount(Q5 拍板);首次上傳同時回填 driveFolderId(規則 13 寫入端)
        const memberUpdate = { recordCount: increment(1) };
        if (backfillFolderId) memberUpdate.driveFolderId = backfillFolderId;
        await updateDoc(doc(db, "members", memberId), memberUpdate);
        // 本地同步 driveFolderId、下次上傳直接走快速主路徑、不再走保底
        if (backfillFolderId) memberData.driveFolderId = backfillFolderId;

        // N2 拍板:本地 +1 只在「上傳成功的 callback 裡」做、失敗 UI 不變
        localRecordCount += 1;
        document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;

        showProgressToast("success", 100);  // 子步 3c.3:100% + 1.5 秒自動淡出
        hidePlayback(); // 試聽區消失、回 idle
        // 子步 3a F_R2 拍板:不再 call loadRecordings、靠 onSnapshot 推送新文件(避免雙 fetch race)

      } catch (err) {
        console.error("上傳失敗:", err);
        showProgressToast("error", null);  // 子步 3c.3:percent=null 停在當前寬度、變紅、1.5 秒淡出
        // 失敗:UI 不變、保留試聽區、用戶可再按 ☁ 重試 或 ↻ 重錄
      } finally {
        uploadBtn.disabled = false;
        playBtn.disabled   = false;
        resetBtn.disabled  = false;
        uploadBtn.textContent = originalUploadText;
      }
    }

    uploadBtn.addEventListener("click", handleUpload);

    /* ============================================================
       子步 4a:過去錄音清單 fetch + render + Hero N 改用清單長度
       Q5 拍板:個人頁 N 用清單長度為真(recordCount 仍雙寫但首頁卡片才讀)
       ============================================================ */

    const recordingsList = document.getElementById("recordingsList");
    let allRecordings = []; // 子步 4b 播放時要用 filename 推 mimeType

    function parseFilenameToDate(filename) {
      // 格式:{memberId}_MMDDHHMM.ext → MM/DD HH:MM
      const m = (filename || "").match(/_(\d{2})(\d{2})(\d{2})(\d{2})\./);
      if (!m) return "";
      const [, mm, dd, hh, min] = m;
      return `${mm}/${dd} ${hh}:${min}`;
    }

    async function loadRecordings() {
      try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?action=list`);
        const data = await resp.json();
        // Task 5 Step 1:保底 list 新 schema 是 { ok, mode:'fallback', result:{ memberId:[...] } }、
        // 舊 schema 是扁平 { memberId:[...] };兩者都吃、過渡期相容(只改解析、render 不動)
        let items = (data.result && data.result[memberId]) || data[memberId] || [];
        // VC-3a 修:語音留言檔名為 {memberId}_cmt_…、被後端保底 list 混進此清單;
        // 它們不是「錄音」、也沒有 recordings 文件 → 濾掉(同時修正「N 則錄音」灌水)
        // 排序 fix:後端保底 list 也會把照片(.jpg 等)一起列出來、混進純錄音清單;
        // 只保留音訊副檔名(.webm / .mp4 / .m4a),濾掉照片與其他非錄音檔。
        items = items.filter(it => {
          const fn = it.filename || "";
          if (fn.includes("_cmt_")) return false;       // 語音留言、非錄音
          return /\.(webm|mp4|m4a)$/i.test(fn);          // 只留音訊
        });
        // 排序同子步 3c.2:filename desc(時間戳大=新)、tiebreak fileId desc(共用 sortByNewest)
        sortByNewest(items);
        allRecordings = items;
        renderRecordings(items);
        // Q5 拍板:Hero N 改用清單長度為真、覆蓋 renderHero 寫的 recordCount
        localRecordCount = items.length;
        document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
      } catch (err) {
        console.error("loadRecordings 失敗:", err);
        recordingsList.innerHTML = `<div class="recordings-empty">⚠ 載入失敗、請重新整理</div>`;
      }
    }

    function renderRecordings(items) {
      if (items.length === 0) {
        recordingsList.innerHTML = `<div class="recordings-empty">還沒有錄音、按上面麥克風錄第一段吧</div>`;
        return;
      }
      recordingsList.innerHTML = "";
      const total = items.length;
      const myDeviceId = getDeviceId();
      items.forEach((item, idx) => {
        const ordinal = total - idx; // 最上面 = 第 N 段(最新)、最下面 = 第 1 段
        const likes = item.likes || [];
        const liked = likes.includes(myDeviceId);
        const row = document.createElement("div");
        row.className = "recording-row";
        row.dataset.fileId = item.fileId; // 子步 3a onSnapshot 用、partial update 不重 render 整 row
        row.innerHTML = `
          <div class="recording-row__top">
            <div class="recording-row__icon">🎵</div>
            <div class="recording-row__text">
              <div class="recording-row__date">${parseFilenameToDate(item.filename)}</div>
              <div class="recording-row__index">第 ${ordinal} 段錄音</div>
            </div>
            <button class="recording-row__play" aria-label="播放第 ${ordinal} 段">▶</button>
          </div>
          <div class="recording-row__bottom">
            <button class="recording-row__action recording-row__like ${liked ? 'recording-row__like--liked' : ''}" aria-label="按讚第 ${ordinal} 段">
              <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C.5 8 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4 4.5 8-2.5 4.5-9.5 9-9.5 9z"/></svg>
              <span class="recording-row__like-count">${likes.length}</span>
            </button>
            <button class="recording-row__action recording-row__comment" aria-label="留言第 ${ordinal} 段">
              <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              <span class="recording-row__comment-count">${(item.comments || []).length}</span>
            </button>
            <button class="recording-row__action recording-row__share" aria-label="分享第 ${ordinal} 段">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </button>
          </div>
        `;
        row.querySelector(".recording-row__play").addEventListener("click", (e) => {
          playRecording(item.fileId, item.filename, e.currentTarget);
        });
        row.querySelector(".recording-row__like").addEventListener("click", (e) => {
          handleLikeToggle(item.fileId, e.currentTarget);
        });
        row.querySelector(".recording-row__comment").addEventListener("click", () => {
          openCommentSheet(item.fileId);
        });
        row.querySelector(".recording-row__share").addEventListener("click", () => {
          handleShare(item.fileId);
        });
        // ⋯ 刪除選單(6-2 Stage 3:只在自己錄音 memberId===getMyId() 時掛、共用 buildDeleteMenu)
        if (getMyId() === memberId) {
          row.querySelector(".recording-row__top").appendChild(buildDeleteMenu({
            menuLabel: "🗑 刪除這段錄音",
            confirmMsg: "確定刪除這段錄音?刪了就回不來囉。",
            onDelete: () => deleteRecording(item.fileId),
            showToast
          }));
        }
        recordingsList.appendChild(row);
      });
    }

    /* ============================================================
       子步 4b:點播放 / 暫停 / 切換
       拍板對應:M1 獨立 audio element、M2 載入中 disabled + 5 秒慢 toast、M3 mimeType 從 filename 後綴
       F1 實測:?id=fileId 回純 base64 string(無 JSON 包裝、無 dataURL prefix)
       ============================================================ */

    const recordingsAudio = document.getElementById("recordingsAudio");
    let currentPlayingBtn = null;
    let currentPlayingFileId = null;
    let pausedFileId = null;   // B(b版):暫停中的 fileId、獨立旗標、只在最上面攔截續播、不碰全新播放路徑
    let recordingsObjUrl = null;   // 3rd 修:播放用 objectURL(取代 data URI、修大檔 NotSupportedError;規則5 釋放)
    function revokeRecordingsObjUrl() {
      if (recordingsObjUrl) { URL.revokeObjectURL(recordingsObjUrl); recordingsObjUrl = null; }
    }
    let playLoadingTimer = null;

    function pickMimeFromFilename(filename) {
      // M3 拍板:filename 後綴判斷、fallback audio/webm
      // Task 5 Step 1:audio/mp4 後端副檔名改 .m4a、播放仍當 audio/mp4(.m4a 即 mp4 容器音訊)
      const fn = filename || "";
      if (fn.endsWith(".mp4") || fn.endsWith(".m4a")) return "audio/mp4";
      return "audio/webm";
    }

    function setPlayBtnState(btn, state) {
      btn.classList.remove("recording-row__play--loading", "recording-row__play--playing");
      if (state === "loading") {
        btn.classList.add("recording-row__play--loading");
        btn.textContent = "⌛";
        btn.disabled = true;
      } else if (state === "playing") {
        btn.classList.add("recording-row__play--playing");
        btn.textContent = "⏸";
        btn.disabled = false;
      } else {
        btn.textContent = "▶";
        btn.disabled = false;
      }
    }

    async function playRecording(fileId, filename, btn) {
      // 【續播】同筆暫停中 + 有有效 src → 從 currentTime 續播(獨立旗標、不重 fetch、不影響下面全新播放路徑)
      if (pausedFileId === fileId && recordingsAudio.paused && recordingsAudio.src) {
        pausedFileId = null;
        currentPlayingBtn = btn;          // 復原狀態 → 之後可再暫停 / 切別筆能停這筆
        currentPlayingFileId = fileId;
        setPlayBtnState(btn, "playing");
        recordingsAudio.play().catch(() => {});
        return;
      }

      // 點同一筆且正在播 → 暫停(比照原版清 currentPlaying*;只多記 pausedFileId 供續播)
      if (currentPlayingFileId === fileId && !recordingsAudio.paused) {
        recordingsAudio.pause();
        pausedFileId = fileId;            // ← 唯一新增:記住暫停的是哪筆(src 保留不動)
        setPlayBtnState(btn, "idle");
        currentPlayingBtn = null;
        currentPlayingFileId = null;
        return;
      }

      // 全新播放 / 切別筆:放棄任何暫停態(回到 4495cb2 的正確流程)
      pausedFileId = null;

      // 點別筆 → 把當前播放的停掉、按鈕回 idle、釋放舊 objectURL
      if (currentPlayingBtn && currentPlayingBtn !== btn) {
        setPlayBtnState(currentPlayingBtn, "idle");
        recordingsAudio.pause();
        recordingsAudio.removeAttribute("src");
        recordingsAudio.load();
        revokeRecordingsObjUrl();
      }

      // 進 loading
      setPlayBtnState(btn, "loading");
      currentPlayingBtn = btn;
      currentPlayingFileId = fileId;

      // M2 加分:5 秒還在 loading → toast「網路有點慢」(避免長輩雙重點擊)
      if (playLoadingTimer) clearTimeout(playLoadingTimer);
      playLoadingTimer = setTimeout(() => {
        if (currentPlayingFileId === fileId && btn.classList.contains("recording-row__play--loading")) {
          showToast("網路有點慢、再等一下…", 2500);
        }
      }, 5000);

      try {
        const resp = await fetch(`${APPS_SCRIPT_URL}?id=${encodeURIComponent(fileId)}`);
        const base64 = await resp.text();
        if (playLoadingTimer) { clearTimeout(playLoadingTimer); playLoadingTimer = null; }

        // 載入期間用戶點別筆 / 暫停了 → 不繼續播
        if (currentPlayingFileId !== fileId) return;

        const mime = pickMimeFromFilename(filename);
        // 3rd 修:base64 → Blob → objectURL(取代 data URI、避免大檔 NotSupportedError;同語音留言那招)
        const bin = atob(base64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        revokeRecordingsObjUrl();   // 釋放上一個(若有)
        recordingsObjUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));
        recordingsAudio.src = recordingsObjUrl;
        await recordingsAudio.play();
        setPlayBtnState(btn, "playing");
      } catch (err) {
        console.error("playRecording 失敗:", err);
        showToast("⚠ 播放失敗、請重試", 2800);
        setPlayBtnState(btn, "idle");
        revokeRecordingsObjUrl();   // 失敗也釋放、不漏
        if (currentPlayingFileId === fileId) {
          currentPlayingBtn = null;
          currentPlayingFileId = null;
        }
      }
    }

    recordingsAudio.addEventListener("ended", () => {
      pausedFileId = null;   // 播完 → 下次播該筆從頭(重 fetch)
      revokeRecordingsObjUrl();   // 播完釋放(下次重 fetch 建新的)
      if (currentPlayingBtn) {
        setPlayBtnState(currentPlayingBtn, "idle");
        currentPlayingBtn = null;
        currentPlayingFileId = null;
      }
    });

    /* ============================================================
       Task 3 子步 3a:按讚 ❤️ + onSnapshot 即時同步
       拍板對應:M_R1 modal 後續做 / M_R2 query+where 篩 memberId / M_R3 雙行 row
       F_R2 拍板:loadRecordings 只初始一次、後續全靠 onSnapshot 推送
       ============================================================ */

    let recordingsListenerUnsub = null;

    async function handleLikeToggle(fileId, btn) {
      const myDeviceId = getDeviceId();
      const row = allRecordings.find(r => r.fileId === fileId);
      if (!row) return;

      // 找 Firestore 對應 doc(用 fileId query、子步 3c 寫入時 fileId 是 unique)
      // 走 query memberId+fileId 比較穩
      const q = query(
        collection(db, "recordings"),
        where("memberId", "==", memberId),
        where("fileId", "==", fileId)
      );

      const currentLikes = row.likes || [];
      const wasLiked = currentLikes.includes(myDeviceId);

      // 樂觀更新:UI 立刻 toggle、count 先 ±1
      const nextLikes = wasLiked
        ? currentLikes.filter(id => id !== myDeviceId)
        : [...currentLikes, myDeviceId];
      row.likes = nextLikes;
      updateRowLikes(fileId, nextLikes);

      try {
        // 撈該文件 docId(子步 3a 用 query+getDocs、Task 5 之後 onSnapshot 會 cache docId 在 row 上避免重查)
        const snap = await getDocs(q);
        if (snap.empty) {
          // 孤兒檔(Drive 有檔、Firestore 沒對應 recordings 文件、例如上傳時 addDoc 失敗):
          // 不 throw 嚇人的錯,溫和提示 + 乾淨 rollback(規則 4)
          row.likes = currentLikes;
          updateRowLikes(fileId, currentLikes);
          showToast("這段還不能按讚", 2500);
          return;
        }
        const docRef = snap.docs[0].ref;
        await updateDoc(docRef, {
          likes: wasLiked ? arrayRemove(myDeviceId) : arrayUnion(myDeviceId)
        });
        // 成功:onSnapshot 會推送 server 端確認後的 likes、UI 跟 server 同步
      } catch (err) {
        console.error("按讚失敗、rollback:", err);
        // Rollback:還原 likes 跟 UI
        row.likes = currentLikes;
        updateRowLikes(fileId, currentLikes);
        showToast("⚠ 按讚失敗、請重試", 2500);
      }
    }

    function updateRowLikes(fileId, likes) {
      // M_R2 拍板 partial DOM update、不重 render 整個 row 避免 flicker
      const rowEl = recordingsList.querySelector(`[data-file-id="${fileId}"]`);
      if (!rowEl) return;
      const myDeviceId = getDeviceId();
      const liked = (likes || []).includes(myDeviceId);
      const likeBtn = rowEl.querySelector(".recording-row__like");
      const likeCount = rowEl.querySelector(".recording-row__like-count");
      if (likeBtn) likeBtn.classList.toggle("recording-row__like--liked", liked);
      if (likeCount) likeCount.textContent = (likes || []).length;
    }

    /* 刪一段錄音(6-2 Stage 3:固定順序 deleteDoc → recordCount-1 → deleteFile)。
       沿用 like 的「by fileId 查 docRef」(規則2/3);removed 分支負責移 UI、這裡不碰清單。
       拋錯 → 交給 buildDeleteMenu 統一 toast「刪除失敗」;孤兒檔則溫和提示後 return(不算失敗)。 */
    async function deleteRecording(fileId) {
      const snap = await getDocs(query(
        collection(db, "recordings"),
        where("memberId", "==", memberId),
        where("fileId", "==", fileId)
      ));
      if (snap.empty) { showToast("這段找不到了、可能已刪除", 2500); return; }   // 孤兒檔/已刪(規則4)
      await deleteDoc(snap.docs[0].ref);                              // 1) 刪 doc → removed 分支移 UI + 重排
      try { await updateDoc(doc(db, "members", memberId), { recordCount: increment(-1) }); }  // 2) 統計 -1(規則13)
      catch (e) { console.warn("[delete] recordCount -1 失敗:", e && e.message ? e.message : e); }
      deleteDriveFile(APPS_SCRIPT_URL, fileId)                        // 3) 背景刪 Drive 檔(失敗只 toast、留孤兒檔)
        .catch(() => showToast("錄音檔沒刪成功、之後再清", 2500));
    }

    function setupRecordingsListener() {
      // 拆掉舊 listener(切換 member 才會發生、目前不會、防呆)
      if (recordingsListenerUnsub) { recordingsListenerUnsub(); recordingsListenerUnsub = null; }
      const q = query(
        collection(db, "recordings"),
        where("memberId", "==", memberId)
      );
      recordingsListenerUnsub = onSnapshot(q, (snap) => {
        let listChanged = false;
        snap.docChanges().forEach((change) => {
          const data = change.doc.data();
          const fileId = data.fileId;
          if (!fileId) return;
          if (change.type === "added") {
            // 新文件:檢查 allRecordings 有沒有(初始 loadRecordings 撈過會有、新上傳的不會)
            let row = allRecordings.find(r => r.fileId === fileId);
            if (!row) {
              allRecordings.push({
                fileId,
                filename: data.filename || "",
                likes: data.likes || [],
                comments: data.comments || []
              });
              listChanged = true;
            } else {
              // 既有 row、合 likes / comments 進來
              row.likes = data.likes || [];
              row.comments = data.comments || [];
              updateRowLikes(fileId, row.likes);
              updateRowComments(fileId, row.comments);
            }
          } else if (change.type === "modified") {
            const row = allRecordings.find(r => r.fileId === fileId);
            if (row) {
              row.likes = data.likes || [];
              row.comments = data.comments || [];
              updateRowLikes(fileId, row.likes);
              updateRowComments(fileId, row.comments);
            }
          } else if (change.type === "removed") {
            // 6-2 Stage 3:刪除 → 從 allRecordings 移除該 fileId、重排 render、count 同步
            const i = allRecordings.findIndex(r => r.fileId === fileId);
            if (i !== -1) {
              allRecordings.splice(i, 1);
              renderRecordings(allRecordings);
              localRecordCount = allRecordings.length;
              document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
            }
          }
        });
        if (listChanged) {
          // 新文件加入、重新排序 + render(子步 3a 不接 comments、子步 3c 補)
          allRecordings.sort((a, b) => {
            const fnCmp = (b.filename || "").localeCompare(a.filename || "");
            if (fnCmp !== 0) return fnCmp;
            return (b.fileId || "").localeCompare(a.fileId || "");
          });
          renderRecordings(allRecordings);
          localRecordCount = allRecordings.length;
          document.getElementById("heroCount").textContent = `${localRecordCount} 則錄音`;
        }
      }, (err) => {
        console.error("onSnapshot 失敗:", err);
      });
    }

    /* ============================================================
       Task 3 子步 3b:留言 Bottom Sheet UI 骨架(無寫入、子步 3c 接送出)
       拍板對應:Q3 下滑 70% 高、標題 + 列表 + 輸入框、Bottom Sheet 概念
       ============================================================ */

    const commentSheet           = document.getElementById("commentSheet");
    const commentList            = document.getElementById("commentList");
    const commentInput           = document.getElementById("commentInput");
    const commentSubmit          = document.getElementById("commentSubmit");
    const commentCloseBtn        = commentSheet.querySelector(".comment-sheet__close");
    const commentBackdrop        = commentSheet.querySelector(".comment-sheet__backdrop");
    const commentIdentity        = document.getElementById("commentIdentity");
    const commentIdentityName    = document.getElementById("commentIdentityName");
    const commentIdentityPill    = document.getElementById("commentIdentityPill");
    const commentIdentitySwitch  = document.getElementById("commentIdentitySwitch");

    let currentCommentFileId = null;

    function updateIdentityPill() {
      const myId = getMyId();
      if (!myId) { commentIdentity.hidden = true; return; }
      const me = myCachedMembers.find(m => m.id === myId);
      if (!me)   { commentIdentity.hidden = true; return; }
      commentIdentityName.textContent = me.name || me.nickname || "(未命名)";
      commentIdentity.hidden = false;
    }

    async function switchIdentity() {
      await ensureMembersLoaded();
      if (myCachedMembers.length === 0) { showToast("家族成員載入失敗、請重試"); return; }
      openIdentityModalLocal(() => {
        updateIdentityPill();
        setTimeout(() => commentInput.focus(), 50);
      });
    }

    commentIdentityPill.addEventListener("click", switchIdentity);
    commentIdentitySwitch.addEventListener("click", switchIdentity);

    async function openCommentSheet(fileId) {
      const row = allRecordings.find(r => r.fileId === fileId);
      if (!row) return;
      currentCommentFileId = fileId;
      renderComments(row.comments || []);
      commentInput.value = "";
      commentSheet.hidden = false;
      // 已選過「我」→ ensure members cache、顯示身份 pill;沒選過 → pill hidden
      if (getMyId()) {
        await ensureMembersLoaded();
        updateIdentityPill();
      } else {
        commentIdentity.hidden = true;
      }
    }

    function closeCommentSheet() {
      commentSheet.hidden = true;
      currentCommentFileId = null;
    }

    function renderComments(comments) {
      if (!comments || comments.length === 0) {
        commentList.innerHTML = `<div class="comment-sheet__empty">還沒有留言、第一個說點什麼吧</div>`;
        return;
      }
      commentList.innerHTML = "";
      comments.forEach(c => {
        const author = c.authorName || "(家人)"; // 子步 3c 寫入時帶 authorName、子步 3b fallback
        const time = formatCommentTime(c.createdAt);
        const row = document.createElement("div");
        row.className = "comment-row";
        row.innerHTML = `
          <div class="comment-row__author">${escapeHtml(author)}</div>
          <div class="comment-row__text">${escapeHtml(c.text || "")}</div>
          <div class="comment-row__time">${time}</div>
        `;
        commentList.appendChild(row);
      });
    }

    function formatCommentTime(timestamp) {
      if (!timestamp) return "";
      try {
        // Firestore Timestamp 物件 / Date / number 都接
        const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diff = (now - d) / 1000;
        if (diff < 60)    return "剛剛";
        if (diff < 3600)  return `${Math.floor(diff / 60)} 分鐘前`;
        if (diff < 86400) return `${Math.floor(diff / 3600)} 小時前`;
        return `${d.getMonth() + 1}/${d.getDate()}`;
      } catch (e) {
        return "";
      }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

    async function submitComment(text, authorMemberId, authorName) {
      const fileId = currentCommentFileId;
      if (!fileId) return;
      const row = allRecordings.find(r => r.fileId === fileId);
      if (!row) return;

      const deviceId = getDeviceId();
      const newComment = {
        deviceId,
        memberId: authorMemberId,
        authorName,
        text,
        createdAt: new Date()  // arrayUnion 不接 serverTimestamp、用 client Date(6/15 接受)
      };

      // 樂觀更新
      const prevComments = row.comments || [];
      row.comments = [...prevComments, newComment];
      updateRowComments(fileId, row.comments);
      commentInput.value = "";
      commentSubmit.disabled = true;

      try {
        const q = query(
          collection(db, "recordings"),
          where("memberId", "==", memberId),
          where("fileId", "==", fileId)
        );
        const snap = await getDocs(q);
        if (snap.empty) {
          // 孤兒檔(Drive 有檔、Firestore 沒對應 recordings 文件):溫和提示 + 乾淨 rollback、不 throw(規則 4)
          row.comments = prevComments;
          updateRowComments(fileId, row.comments);
          commentInput.value = text;
          showToast("這段還不能留言", 2500);
          return;
        }
        const docRef = snap.docs[0].ref;
        await updateDoc(docRef, { comments: arrayUnion(newComment) });
        // 成功:onSnapshot 推送 server 端 comments、updateRowComments re-render
      } catch (err) {
        console.error("送出留言失敗、rollback:", err);
        row.comments = prevComments;
        updateRowComments(fileId, row.comments);
        commentInput.value = text; // 還原文字、用戶不必重打
        showToast("⚠ 送出失敗、請重試", 2500);
      } finally {
        commentSubmit.disabled = false;
      }
    }

    /* Task 4 Step 3:deep link 落點 — #rec={fileId} → scroll + 2 秒金邊高亮、跑完清 hash(補 B:F5 不重跳)*/
